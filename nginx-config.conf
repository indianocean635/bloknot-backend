server {
    listen 80;
    server_name 185.10.187.195;

    # Фронтенд
    root /var/www/bloknot-frontend;
    index index.html;

    # Обработка SPA маршрутов
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API на бэкенд
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Статические файлы с кешированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Загрузка файлов
    location /uploads/ {
        alias /var/www/bloknot-backend/public/uploads/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://widget.cloudpayments.ru https://static.cloudpayments.ru https://static-stage.cloudpayments.ru https://cdn.cloudpayments.ru https://cp.ru https://fingerprint.t-static.ru https://forma.tinkoff.ru https://pay.google.com https://www.gstatic.com; connect-src 'self' https://widget.cloudpayments.ru https://api.cloudpayments.ru https://intent-api.cloudpayments.ru https://fingerprint.t-static.ru https://forma.tinkoff.ru https://pay.google.com https://fcm.googleapis.com https://firebase.googleapis.com; img-src 'self' data: https://widget.cloudpayments.ru https://static.cloudpayments.ru https://static-stage.cloudpayments.ru https://cp.ru https://qr.nspk.ru https://cdn.cloudpayments.ru https://www.gstatic.com https://intent-api.cloudpayments.ru" always;
}
