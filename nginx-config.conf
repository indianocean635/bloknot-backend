server {
    server_name bloknotservis.ru www.bloknotservis.ru;

    # Security headers for CloudPayments + Firebase
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://widget.cloudpayments.ru https://static.cloudpayments.ru https://static-stage.cloudpayments.ru https://cdn.cloudpayments.ru https://cp.ru https://fingerprint.t-static.ru https://forma.tinkoff.ru https://pay.google.com https://www.gstatic.com; connect-src 'self' https://widget.cloudpayments.ru https://api.cloudpayments.ru https://intent-api.cloudpayments.ru https://fingerprint.t-static.ru https://forma.tinkoff.ru https://pay.google.com https://fcm.googleapis.com https://firebase.googleapis.com https://firebaseinstallations.googleapis.com; img-src 'self' data: https://widget.cloudpayments.ru https://static.cloudpayments.ru https://static-stage.cloudpayments.ru https://cp.ru https://qr.nspk.ru https://cdn.cloudpayments.ru https://www.gstatic.com https://intent-api.cloudpayments.ru" always;

    # API proxy
    location /api/ {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable caching for API
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Auth proxy - FIX FOR MAGIC LINK!
    location /auth/ {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable caching for auth
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static files
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bloknotservis.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bloknotservis.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.bloknotservis.ru) {
        return 301 https://$host$request_uri;
    }

    if ($host = bloknotservis.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name bloknotservis.ru www.bloknotservis.ru;
    return 404;
}
