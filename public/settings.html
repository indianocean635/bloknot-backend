<script>
// Initialize specialist forms on page load
document.addEventListener('DOMContentLoaded', function() {
  // Initialize header
  if (typeof Bloknot !== 'undefined' && Bloknot.renderHeader) {
    Bloknot.renderHeader("settings");
  }

  // Load specialist limit from API instead of localStorage
  loadSpecialistLimitFromAPI();

  // Load all data (logo, works, etc.)
  loadAllData();

  // Hide add specialist button if no tariff selected
  const addBtn = document.getElementById('addMasterBtn');
  if (addBtn) {
    addBtn.style.display = 'none';
  }

  // Add work button event listener
  const addWorkBtn = document.getElementById('addWorkBtn');
  if (addWorkBtn) {
    // Remove any existing listeners to prevent duplicates
    const newBtn = addWorkBtn.cloneNode(true);
    addWorkBtn.parentNode.replaceChild(newBtn, addWorkBtn);
    newBtn.addEventListener('click', handleAddWork);
  }
});

// Load specialist limit from API
async function loadSpecialistLimitFromAPI() {
  try {
    console.log('[LOAD] Starting parallel API calls...');

    // Make API calls in parallel for faster loading
    const [userResponse, businessResponse] = await Promise.all([
      api('/api/auth/me'),
      api('/api/settings/business')
    ]);

    const user = userResponse.user;
    const business = businessResponse;

    console.log('[LOAD] API calls completed');

    if (!user.businessId) {
      console.log('No business found for user');
      showNoBusinessUI();
      return;
    }

    console.log('Business data:', business);
    console.log('Subscription:', business.subscription);

    // Update specialist forms based on subscription
    const subscription = business.subscription || { plan: 'FREE' };
    const specialistLimit = getSpecialistLimitFromPlan(subscription.plan);

    console.log('Specialist limit:', specialistLimit);

    updateSpecialistForms(specialistLimit);

  } catch (error) {
    console.error('Error loading specialist limit:', error);
    showNoBusinessUI();
  }
}

// Get specialist limit from plan name
function getSpecialistLimitFromPlan(plan) {
  if (!plan || plan === 'FREE' || plan === 'free') return 0; // No subscription = 0 specialists
  if (plan.includes('1') || plan === 'SOLO') return 1;
  if (plan.includes('5') || plan === 'STUDIO') return 5;
  return 15; // PRO or default
}

// Show UI for users without business - DISABLED
function showNoBusinessUI() {
  // Do nothing - all users now have business after registration
  console.log('showNoBusinessUI called but disabled');
}

// Load specialists from API
async function loadSpecialistsFromAPI() {
  try {
    const specialists = await api('/api/specialists');
    console.log('Loaded specialists from API:', specialists);
    
    // Update UI with loaded specialists
    updateSpecialistsUI(specialists);
    
  } catch (error) {
    console.error('Error loading specialists:', error);
    // Show empty state instead of fallback
    updateSpecialistsUI([]);
  }
}

// Update specialists UI
function updateSpecialistsUI(specialists) {
  // TODO: Implement UI update with specialists data
  console.log('Updating specialists UI with:', specialists);
}

// Tariff selection
function selectTariff(plan, price) {
  const planNames = {
    'SOLO': '1 специалист',
    'STUDIO': '5 специалистов',
    'PRO': 'Более 5 специалистов'
  };
  
  document.getElementById('selectedPlanName').textContent = planNames[plan];
  document.getElementById('selectedPlanPrice').textContent = price;
  document.getElementById('paymentModal').style.display = 'block';
}

function closePaymentModal() {
  document.getElementById('paymentModal').style.display = 'none';
}

async function processPayment() {
  const cardNumber = document.getElementById('cardNumber').value;
  const cardExpiry = document.getElementById('cardExpiry').value;
  const cardCVV = document.getElementById('cardCVV').value;
  
  if (!cardNumber || !cardExpiry || !cardCVV) {
    document.getElementById('paymentError').textContent = 'Пожалуйста, заполните все данные карты';
    return;
  }
  
  const planName = document.getElementById('selectedPlanName').textContent;
  
  // Map plan name to plan ID
  let planId = 'SOLO';
  if (planName.includes('Solo') || planName.includes('1')) {
    planId = 'SOLO';
  } else if (planName.includes('Studio') || planName.includes('5')) {
    planId = 'STUDIO';
  } else if (planName.includes('Pro') || planName.includes('15')) {
    planId = 'PRO';
  }
  
  try {
    // Call subscription API to save the subscription
    await api('/api/subscription/subscription', {
      method: 'POST',
      body: JSON.stringify({ plan: planId })
    });
    
    console.log(`Subscription created/updated: ${planId}`);
    
    closePaymentModal();
    
    // Calculate specialist limit directly from planId
    const specialistLimit = getSpecialistLimitFromPlan(planId);
    console.log(`Specialist limit from plan ${planId}:`, specialistLimit);
    
    // Update specialist forms immediately
    updateSpecialistForms(specialistLimit);
    
    alert('Оплата успешна! Теперь вы можете добавлять специалистов.');
  } catch (error) {
    console.error('Error processing payment:', error);
    document.getElementById('paymentError').textContent = 'Ошибка при сохранении подписки: ' + error.message;
  }
}

function updateSpecialistForms(limit) {
  const grid = document.getElementById('mastersGrid');
  grid.innerHTML = '';

  for (let i = 1; i <= limit; i++) {
    const form = createSpecialistForm(i);
    grid.appendChild(form);
  }

  // Load all specialist data at once after forms are created
  loadAllSpecialistData();

  // Update add button

// Debounce timer for saving
const saveDebounceTimers = {};

// Save specialist data to API
function saveSpecialistData(index) {
  const nameInput = document.getElementById(`specialistName${index}`);
  const emailInput = document.getElementById(`specialistEmail${index}`);

  const name = nameInput?.value || '';
  const email = emailInput?.value || '';

  // Get the specialist ID from the dataset if it exists
  const specialistId = nameInput?.dataset.specialistId || emailInput?.dataset.specialistId || null;

  // Clear previous debounce timer
  if (saveDebounceTimers[index]) {
    clearTimeout(saveDebounceTimers[index]);
  }

  // Debounce save to avoid too many API calls (reduced to 300ms for faster response)
  saveDebounceTimers[index] = setTimeout(async () => {
    try {
      const specialistData = {
        name,
        email
      };

      if (specialistId) {
        // Update existing specialist by ID
        await api(`/api/specialists/${specialistId}`, {
          method: 'PUT',
          body: JSON.stringify(specialistData)
        });
        console.log(`Updated specialist ${index} (ID: ${specialistId}):`, specialistData);
      } else if (name && email) {
        // Create new specialist only if we have required fields
        const newSpecialist = await api('/api/specialists', {
          method: 'POST',
          body: JSON.stringify(specialistData)
        });
        console.log(`Created specialist ${index}:`, specialistData);

        // Store the new specialist ID on the inputs for future updates
        if (nameInput) nameInput.dataset.specialistId = newSpecialist.id;
        if (emailInput) emailInput.dataset.specialistId = newSpecialist.id;
      }
    } catch (error) {
      console.error(`Error saving specialist ${index}:`, error);
      // Don't show alert for empty fields - that's normal
      if (name || email) {
        alert(`Ошибка сохранения специалиста: ${error.message}`);
      }
    }
  }, 300); // 300ms debounce for faster response
}

// Render calendar for a specific month
function renderCalendar(date, scheduleData) {
  const container = document.getElementById('scheduleSettings');
  const monthLabel = document.getElementById('currentMonth');
  if (!container || !monthLabel) return;

  const year = date.getFullYear();
  const month = date.getMonth();
  const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                      'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
  monthLabel.textContent = `${monthNames[month]} ${year}`;

  // Get first day of month and total days
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const totalDays = lastDay.getDate();
  const startDayOfWeek = firstDay.getDay();

  // Generate calendar grid
  let html = '';
  
  // Add empty cells for days before the 1st
  for (let i = 0; i < (startDayOfWeek === 0 ? 6 : startDayOfWeek - 1); i++) {
    html += '<div style="padding: 8px;"></div>';
  }

  // Add day cells
  for (let day = 1; day <= totalDays; day++) {
    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const daySchedule = scheduleData[dateKey];
    const timeText = daySchedule && daySchedule.enabled
      ? `${daySchedule.startTime} - ${daySchedule.endTime}`
      : '-';

    html += `
      <div class="day-cell" data-date="${dateKey}"
           style="padding: 8px; border: 2px solid #e5e7eb; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; ${daySchedule && daySchedule.enabled ? 'border-color: #3b82f6; background-color: #eff6ff;' : ''}"
           onclick="selectDay(this)">
        <div style="font-weight: 600; font-size: 14px;">${day}</div>
        <div class="day-time" style="font-size: 10px; color: #6b7280; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${timeText}</div>
      </div>
    `;
  }

  container.innerHTML = html;

  // Re-attach event listeners
  container.querySelectorAll('.day-cell').forEach(cell => {
    cell.addEventListener('click', function(e) {
      // Handle multi-select with Ctrl/Cmd
      if (!e.ctrlKey && !e.metaKey) {
        // Deselect all other cells
        container.querySelectorAll('.day-cell.selected').forEach(c => {
          if (c !== this) {
            c.classList.remove('selected');
            c.style.borderColor = c.dataset.timeEnabled ? '#3b82f6' : '#e5e7eb';
            c.style.backgroundColor = c.dataset.timeEnabled ? '#eff6ff' : 'white';
          }
        });
      }

      // Toggle selection
      this.classList.toggle('selected');
      if (this.classList.contains('selected')) {
        this.style.borderColor = '#3b82f6';
        this.style.backgroundColor = '#eff6ff';
      } else {
        this.style.borderColor = this.dataset.timeEnabled ? '#3b82f6' : '#e5e7eb';
        this.style.backgroundColor = this.dataset.timeEnabled ? '#eff6ff' : 'white';
      }

      // Show time panel if any day is selected
      const selectedDays = container.querySelectorAll('.day-cell.selected');
      const timePanel = document.getElementById('timeSettingsPanel');
      if (selectedDays.length > 0) {
        timePanel.style.display = 'block';

        // Load time from first selected day
        const timeDisplay = selectedDays[0].querySelector('.day-time');
        if (timeDisplay && timeDisplay.textContent !== '-') {
          const [start, end] = timeDisplay.textContent.split(' - ');
          document.getElementById('startTime').value = start || '09:00';
          document.getElementById('endTime').value = end || '18:00';
        }
      } else {
        timePanel.style.display = 'none';
      }
    });
  });
}

// Change month
function changeMonth(delta) {
  currentScheduleDate.setMonth(currentScheduleDate.getMonth() + delta);
  // Get current schedule data from UI
  const scheduleData = {};
  document.querySelectorAll('.day-cell').forEach(cell => {
    const dateKey = cell.dataset.date;
    const timeDisplay = cell.querySelector('.day-time');
    const timeText = timeDisplay?.textContent || '-';
    if (timeText !== '-' && timeText !== '') {
      const [startTime, endTime] = timeText.split(' - ');
      scheduleData[dateKey] = {
        enabled: true,
        startTime: startTime || '09:00',
        endTime: endTime || '18:00'
      };
    }
  });
  renderCalendar(currentScheduleDate, scheduleData);
}

// Apply schedule time to selected days
function applyScheduleTime() {
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;
  const applyToSelected = document.getElementById('applyToSelected').checked;

  const selectedDays = document.querySelectorAll('.day-cell.selected');

  if (selectedDays.length === 0) {
    alert('Выберите хотя бы один день');
    return;
  }

  selectedDays.forEach(dayCell => {
    const timeDisplay = dayCell.querySelector('.day-time');
    if (timeDisplay) {
      timeDisplay.textContent = `${startTime} - ${endTime}`;
      dayCell.style.borderColor = '#3b82f6';
      dayCell.style.backgroundColor = '#eff6ff';
      dayCell.dataset.timeEnabled = 'true';
    }
  });

  // If applyToSelected is not checked, deselect all
  if (!applyToSelected) {
    selectedDays.forEach(dayCell => {
      dayCell.classList.remove('selected');
    });
    document.getElementById('timeSettingsPanel').style.display = 'none';
  }
}

// Clear schedule time for selected days
function clearScheduleTime() {
  const selectedDays = document.querySelectorAll('.day-cell.selected');

  if (selectedDays.length === 0) {
    alert('Выберите хотя бы один день');
    return;
  }

  selectedDays.forEach(dayCell => {
    const timeDisplay = dayCell.querySelector('.day-time');
    if (timeDisplay) {
      timeDisplay.textContent = '-';
      dayCell.style.borderColor = '#e5e7eb';
      dayCell.style.backgroundColor = 'white';
      delete dayCell.dataset.timeEnabled;
    }
    dayCell.classList.remove('selected');
  });

  document.getElementById('timeSettingsPanel').style.display = 'none';
}

let isUploadingWork = false;

async function handleAddWork() {
  if (isUploadingWork) {
    console.warn('[WORKS] Upload already in progress, ignoring duplicate click');
    return;
  }

  isUploadingWork = true;
  console.log('[WORKS] Starting file selection...');

  const addWorkBtn = document.getElementById('addWorkBtn');
  if (addWorkBtn) {
    addWorkBtn.disabled = true;
    addWorkBtn.textContent = 'Загрузка...';
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) {
      isUploadingWork = false;
      if (addWorkBtn) {
        addWorkBtn.disabled = false;
        addWorkBtn.textContent = '+ Добавить фото';
      }
      console.log('[WORKS] No file selected');
      return;
    }

    console.log('[WORKS] File selected, starting upload...');

    const formData = new FormData();
    formData.append('image', file);

    try {
      console.log('[WORKS] Uploading work...');
      const response = await fetch('/api/upload/works', {
        method: 'POST',
        body: formData,
        credentials: 'include'
      });

      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const result = await response.json();
      console.log('[WORKS] Upload successful:', result);

      alert('Фото успешно загружено!');
      // Reload works
      loadWorks();
    } catch (error) {
      console.error('[WORKS] Upload error:', error);
      alert('Ошибка загрузки фото: ' + error.message);
    } finally {
      isUploadingWork = false;
      if (addWorkBtn) {
        addWorkBtn.disabled = false;
        addWorkBtn.textContent = '+ Добавить фото';
      }
      console.log('[WORKS] Upload completed');
    }
  };
  input.click();
}

// API helper
async function api(url, options = {}) {
  const defaultOptions = {
    headers: {
      'Content-Type': 'application/json',
    },
    credentials: 'include',
  };

  const finalOptions = { ...defaultOptions, ...options };

  if (finalOptions.body && typeof finalOptions.body === 'string') {
    finalOptions.body = finalOptions.body;
  }

  const response = await fetch(url, finalOptions);

  if (!response.ok) {
    throw new Error(`HTTP error! status: ${response.status}`);
  }

  return response.json();
}

let deletingWorkIds = new Set();

async function deleteWork(id) {
  if (deletingWorkIds.has(id)) {
    console.warn('[DELETE WORK] Already deleting work', id, 'ignoring duplicate click');
    return;
  }

  deletingWorkIds.add(id);
  console.log('[DELETE WORK] Starting deletion for work', id);

  try {
    await api(`/api/upload/works/${id}`, {
      method: 'DELETE'
    });
    alert('Фото удалено');
    loadWorks();
  } catch (error) {
    console.error('Error deleting work:', error);
    alert('Ошибка удаления фото');
  } finally {
    deletingWorkIds.delete(id);
    console.log('[DELETE WORK] Deletion completed for work', id);
  }
}
