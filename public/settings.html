<body>

<div id="app-header"></div>

<main class="container">
  <h1 class="page-title">Настройки бизнеса</h1>
  <p class="page-subtitle">Управляйте филиалами, категориями, услугами, мастерами и фото работ</p>

  <!-- Специалисты -->
  <section class="settings-section">
    <div class="section-header">
      <h2>Специалисты</h2>
      <button class="btn" id="addMasterBtn">+ Добавить специалиста</button>
    </div>
    
    <!-- Tariff Selection -->
    <div id="tariffSelection" style="margin-bottom: 16px;">
      <p style="margin: 0 0 12px 0; color: #374151; font-size: 14px;">
        <strong>Выберите тариф: 1, 5 или более специалистов?</strong>
      </p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn secondary" onclick="selectTariff('SOLO', '690')">1 специалист</button>
        <button class="btn secondary" onclick="selectTariff('STUDIO', '990')">5 специалистов</button>
        <button class="btn secondary" onclick="selectTariff('PRO', '1490')">Более 5 специалистов</button>
      </div>
    </div>
    
    <!-- Payment Modal -->
    <div id="paymentModal" class="modal" style="display: none;">
      <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
          <h3>Subscribe to Specialist Plan</h3>
          <button class="modal-close" onclick="closePaymentModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div style="margin-bottom: 20px;">
            <p style="margin: 0 0 12px 0; color: #374151; font-size: 14px;">
              <strong id="selectedPlanName">Plan Name</strong>
            </p>
          </div>
          <div class="logo-actions">
            <button class="btn" id="addLogoBtn">+ Add Logo</button>
            <button class="btn secondary" id="changeLogoBtn" style="display: none;">Change Logo</button>
          </div>
        </div>
        
        <div class="branding-item">
          <h3>Company Name</h3>
          <div class="company-info">
            <input type="text" id="companyNameInput" placeholder="Enter company name">
            <button class="btn" id="saveCompanyNameBtn">Save</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Branches -->
    <section class="settings-section compact">
      <div class="section-header">
        <h2>Branches</h2>
        <button class="btn" id="addBranchBtn">+ Add Branch</button>
      </div>
      
      <div class="items-grid" id="branchesGrid">
      </div>
    </section>

    <!-- Categories -->
    <section class="settings-section compact">
      <div class="section-header">
        <h2>Service Categories</h2>
        <button class="btn" id="addCategoryBtn">+ Add Category</button>
      </div>
      
      <div class="items-grid" id="categoriesGrid">
      </div>
    </section>

    <!-- Services -->
    <section class="settings-section compact">
      <div class="section-header">
        <h2>Services</h2>
        <button class="btn" id="addServiceBtn">+ Add Service</button>
      </div>
      
      <div class="items-grid" id="servicesGrid">
      </div>
    </section>

    <!-- Work Schedule -->
    <section class="settings-section compact">
      <div class="section-header">
        <h2>Work Schedule</h2>
      </div>
      
      <div class="schedule-container" id="scheduleContainer">
      </div>
    </section>

    <!-- Work Photos -->
    <section class="settings-section compact">
      <div class="section-header">
        <h2>Work Photos</h2>
        <button class="btn" id="addWorkBtn">+ Add Photo</button>
      </div>
      
      <div class="items-grid" id="worksGrid">
      </div>
    </section>
  </div>
</main>

<!-- Модальное окно для добавления/редактирования -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Добавить</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Динамическое содержимое -->
    </div>
  </div>

// Simple API function - fallback if Bloknot.api not available
async function apiCall(url, options = {}) {
  console.log('API Call:', url, options);
  
  // Get user email from localStorage
  const userEmail = localStorage.getItem('bloknot_logged_in_email');
  
  if (!userEmail) {
    console.error('No user email found in localStorage');
    window.location.href = '/';
    return;
  }
  
  // Add authentication headers
  const headers = {
    'x-user-email': userEmail,
    ...options.headers
  };
  
  // Try to use Bloknot.api first
  if (typeof Bloknot !== 'undefined' && Bloknot.api) {
    console.log('Using Bloknot.api');
    try {
      let result;
      if (options.method === 'POST') {
        // Handle FormData for file uploads
        if (options.body instanceof FormData) {
          result = await Bloknot.api(url, {
            method: 'POST',
            headers: { ...headers },
            body: options.body
          });
        } else {
          result = await Bloknot.api(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...headers },
            body: options.body
          });
        }
      } else if (options.method === 'PATCH') {
        result = await Bloknot.api(url, {
          method: 'PATCH', 
          headers: { 'Content-Type': 'application/json', ...headers },
          body: options.body
        });
      } else if (options.method === 'DELETE') {
        result = await Bloknot.api(url, {
          method: 'DELETE',
          headers: { ...headers }
        });
      } else {
        result = await Bloknot.api(url, {
          headers: { ...headers }
        });
      }
      console.log('Bloknot.api Success:', result);
      return result;
    } catch (e) {
      console.error('Bloknot.api error:', e);
      console.log('Falling back to fetch');
      // Continue to fallback
    }
  } else {
    console.log('Bloknot.api not available, using fetch');
  }
  
  // Fallback to fetch
  try {
    const response = await fetch(url, {
      headers: options.body instanceof FormData ? {
        'x-user-email': userEmail
      } : {
        'Content-Type': 'application/json',
        ...headers
      },
      ...options
    });
    
    console.log('Fetch response status:', response.status);
    
    if (!response.ok) {
      const errorText = await response.text();
      console.error('Fetch error response:', errorText);
      throw new Error(`HTTP ${response.status}: ${errorText}`);
    }
    
    const result = await response.json();
    console.log('Fetch Success:', result);
    return result;
  } catch (e) {
    console.error('Fetch error:', e);
    throw e;
  }
}

function setupLogoUpload() {
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('logoFile');
  const editorArea = document.getElementById('editorArea');
  const previewImage = document.getElementById('previewImage');
  const uploadBtn = document.getElementById('uploadBtn');
  
  // Image editor variables
  let currentScale = 1;
  let currentX = 0;
  let currentY = 0;
  let originalImageData = null;
  
  uploadArea.addEventListener('click', () => fileInput.click());
  
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImageData = e.target.result;
        showImageEditor(originalImageData);
      };
      reader.readAsDataURL(file);
    }
  });
  
  function showImageEditor(imageData) {
    previewImage.src = imageData;
    previewImage.style.display = 'block';
    
    // Show editor, hide upload area
    uploadArea.style.display = 'none';
    editorArea.style.display = 'block';
    uploadBtn.style.display = 'inline-block';
    
    // Reset controls
    resetImageEditor();
    
    // Setup control listeners
    setupEditorControls();
  }
  
  function setupEditorControls() {
    const scaleSlider = document.getElementById('scaleSlider');
    const positionXSlider = document.getElementById('positionXSlider');
    const positionYSlider = document.getElementById('positionYSlider');
    const scaleValue = document.getElementById('scaleValue');
    const positionXValue = document.getElementById('positionXValue');
    const positionYValue = document.getElementById('positionYValue');
    
    scaleSlider.addEventListener('input', (e) => {
      currentScale = parseFloat(e.target.value);
      scaleValue.textContent = currentScale.toFixed(1) + 'x';
      updateImageTransform();
    });
    
    positionXSlider.addEventListener('input', (e) => {
      currentX = parseInt(e.target.value);
      positionXValue.textContent = currentX;
      updateImageTransform();
    });
    
    positionYSlider.addEventListener('input', (e) => {
      currentY = parseInt(e.target.value);
      positionYValue.textContent = currentY;
      updateImageTransform();
    });
  }
  
  function updateImageTransform() {
    previewImage.style.transform = `translate(-50%, -50%) scale(${currentScale}) translate(${currentX}px, ${currentY}px)`;
  }
  
  window.resetImageEditor = function() {
    currentScale = 1;
    currentX = 0;
    currentY = 0;
    
    const scaleSlider = document.getElementById('scaleSlider');
    const positionXSlider = document.getElementById('positionXSlider');
    const positionYSlider = document.getElementById('positionYSlider');
    const scaleValue = document.getElementById('scaleValue');
    const positionXValue = document.getElementById('positionXValue');
    const positionYValue = document.getElementById('positionYValue');
    
    scaleSlider.value = 1;
    positionXSlider.value = 0;
    positionYSlider.value = 0;
    scaleValue.textContent = '1.0x';
    positionXValue.textContent = '0';
    positionYValue.textContent = '0';
    
    updateImageTransform();
  };
  
  window.backToUpload = function() {
    uploadArea.style.display = 'block';
    editorArea.style.display = 'none';
    uploadBtn.style.display = 'none';
    fileInput.value = '';
  };
  
  // Drag and drop
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.style.background = 'rgba(16, 185, 129, 0.1)';
  });
  
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.style.background = 'transparent';
  });
  
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.background = 'transparent';
    
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      fileInput.files = e.dataTransfer.files;
      const event = new Event('change', { bubbles: true });
      fileInput.dispatchEvent(event);
    }
  });
}

async function uploadAvatar(masterId) {
  const fileInput = document.getElementById('avatarEditorFile');
  const file = fileInput.files[0];
  
  if (!file) {
    alert('Please select a file');
    return;
  }
  
  // Create canvas to apply transformations
  const previewImage = document.getElementById('avatarPreviewImage');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  // Set canvas size (300x300 for circular avatar)
  canvas.width = 300;
  canvas.height = 300;
  
  // Get current transformation values
  const scaleSlider = document.getElementById('avatarScaleSlider');
  const positionXSlider = document.getElementById('avatarPositionXSlider');
  const positionYSlider = document.getElementById('avatarPositionYSlider');
  
  const scale = parseFloat(scaleSlider.value);
  const offsetX = parseInt(positionXSlider.value);
  const offsetY = parseInt(positionYSlider.value);
  
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Create circular clip
      ctx.save();
      ctx.beginPath();
      ctx.arc(150, 150, 150, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      
      // Calculate image dimensions and position
      const imgWidth = img.width * scale;
      const imgHeight = img.height * scale;
      
      const x = (canvas.width - imgWidth) / 2 + offsetX;
      const y = (canvas.height - imgHeight) / 2 + offsetY;
      
      // Draw image with transformations
      ctx.drawImage(img, x, y, imgWidth, imgHeight);
      ctx.restore();
      
      // Convert canvas to blob
      canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append('avatar', blob, 'avatar.png');
        
        try {
          // Upload avatar to S3 via API with authentication
          const response = await apiCall(`/api/upload/masters/${masterId}/avatar`, {
            method: 'POST',
            body: formData
          });
          
          console.log('Avatar uploaded successfully:', response);
          
          closeModal();
          loadMasters();
          resolve();
        } catch (error) {
          console.error('Error uploading avatar:', error);
          alert('Error uploading avatar: ' + error.message);
          reject(error);
        }
      }, 'image/png', 0.9);
    };
    
    img.onerror = () => {
      alert('Error loading image');
      reject(new Error('Image load error'));
    };
    
    img.src = previewImage.src;
  });
}

function generateMonthOptions() {
  const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                   'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
  const currentMonth = new Date().getMonth();
  
  return months.map((month, index) => 
    `<option value="${index}" ${index === currentMonth ? 'selected' : ''}>${month}</option>`
  ).join('');
}

let currentEditingDate = null;

function initializeCalendar() {
  const monthSelect = document.getElementById('scheduleMonth');
  const calendarGrid = document.getElementById('calendarGrid');
  
  monthSelect.addEventListener('change', generateCalendar);
  generateCalendar();
}

function generateCalendar() {
  const monthSelect = document.getElementById('scheduleMonth');
  const calendarGrid = document.getElementById('calendarGrid');
  const month = parseInt(monthSelect.value);
  const year = new Date().getFullYear();
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startingDayOfWeek = firstDay.getDay();
  
  let html = '<div class="calendar-weekdays">';
  const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
  weekdays.forEach(day => {
    html += `<div class="calendar-weekday">${day}</div>`;
  });
  html += '</div><div class="calendar-days">';
  
  // Пустые ячейки для начала месяца
  for (let i = 0; i < (startingDayOfWeek === 0 ? 6 : startingDayOfWeek - 1); i++) {
    html += '<div class="calendar-day empty"></div>';
  }
  
  // Дни месяца
  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const dateStr = date.toDateString();
    html += `<div class="calendar-day" onclick="selectDate('${dateStr}', ${day})">${day}</div>`;
  }
  
  html += '</div>';
  calendarGrid.innerHTML = html;
}

function selectDate(dateStr, day) {
  currentEditingDate = dateStr;
  const timeSelector = document.getElementById('timeSelector');
  const selectedDateSpan = document.getElementById('selectedDate');
  
  selectedDateSpan.textContent = new Date(dateStr).toLocaleDateString('ru-RU');
  timeSelector.style.display = 'block';
  
  // Подсветка выбранного дня
  document.querySelectorAll('.calendar-day').forEach(el => {
    el.classList.remove('selected');
  });
  event.target.classList.add('selected');
}

function setDayOff() {
  if (!currentEditingDate) return;
  
  // Сохраняем как выходной день
  if (!window.tempSchedule) window.tempSchedule = {};
  window.tempSchedule[currentEditingDate] = { working: false };
  
  // Обновляем стиль дня
  event.target.classList.add('day-off');
  
  // Скрываем выбор времени
  document.getElementById('timeSelector').style.display = 'none';
}

function saveDaySchedule() {
  if (!currentEditingDate) return;
  
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;
  
  if (!startTime || !endTime) {
    alert('Выберите время работы');
    return;
  }
  
  // Сохраняем график дня
  if (!window.tempSchedule) window.tempSchedule = {};
  window.tempSchedule[currentEditingDate] = {
    working: true,
    start: startTime,
    end: endTime
  };
  
  // Обновляем стиль дня
  event.target.classList.add('working-day');
  
  // Скрываем выбор времени
  document.getElementById('timeSelector').style.display = 'none';
}

async function saveSchedule(type, email, masterId = null) {
  if (!window.tempSchedule) {
    alert('Настройте хотя бы один день');
    return;
  }
  
  try {
    await apiCall('/api/settings/schedules', {
      method: 'POST',
      body: JSON.stringify({
        type,
        email,
        masterId,
        days: window.tempSchedule
      })
    });
    
    closeModal();
    loadSchedule();
  } catch (error) {
    console.error('Error saving schedule:', error);
    alert('Ошибка сохранения графика');
  }
}

// Фото// Works
async function loadWorks() {
  try {
    const works = await apiCall('/api/settings/works');
    renderWorks(works);
  } catch (error) {
    console.error('Error loading works:', error);
    document.getElementById('worksGrid').innerHTML = '<div class="error">Error loading works</div>';
  }
}

function renderWorks(works) {
  const grid = document.getElementById('worksGrid');
  if (!works || works.length === 0) {
    grid.innerHTML = '<div style="color: #6b7280;">No works</div>';
    return;
  }
  
  grid.innerHTML = works.map(work => `
    <div class="item-card">
      ${work.imageUrl ? `<img src="${work.imageUrl}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 8px;" alt="${work.caption || 'Work photo'}">` : ''}
      <div class="item-header">
        <div class="item-name">${work.caption || 'Untitled'}</div>
      </div>
      <div class="item-actions">
        <button class="delete-btn" onclick="deleteWork(${work.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

function openWorkModal() {
  const body = `
    <form id="workForm">
      <div class="form-group">
        <label for="workImage">Image *</label>
        <input type="file" id="workImage" accept="image/*" required>
      </div>
      <div class="form-group">
        <label for="workCaption">Caption</label>
        <input type="text" id="workCaption" placeholder="Enter photo description">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">Save</button>
      </div>
    </form>
  `;
  
  openModal('Add Work Photo', body);
  
  document.getElementById('workForm').addEventListener('submit', (e) => {
    e.preventDefault();
    saveWork();
  });
}

async function saveWork() {
  const imageFile = document.getElementById('workImage').files[0];
  const caption = document.getElementById('workCaption').value;
  
  if (!imageFile) {
    alert('Please select an image');
    return;
  }
  
  try {
    const formData = new FormData();
    formData.append('image', imageFile);
    if (caption) {
      formData.append('caption', caption);
    }
    
    const response = await apiCall('/api/upload/works', {
      method: 'POST',
      body: formData
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    console.log('Work uploaded successfully');
    closeModal();
    loadWorks();
  } catch (error) {
    console.error('Error saving work:', error);
    alert('Error saving work: ' + error.message);
  }
}

async function deleteWork(id) {
  if (!confirm('Are you sure you want to delete this work photo?')) {
    return;
  }
  
  try {
    await apiCall(`/api/settings/works/${id}`, { method: 'DELETE' });
    loadWorks();
  } catch (error) {
    console.error('Error deleting work:', error);
    alert('Error deleting work: ' + error.message);
  }
}
