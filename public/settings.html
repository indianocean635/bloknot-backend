  <meta charset="UTF-8">

<body>

<div id="app-header"></div>

<main class="container">
  <!-- Specialists -->
  <section class="settings-section">
    <div class="section-header">
      <h2>Специалисты</h2>
      <button class="btn" id="addMasterBtn">+ Добавить специалиста</button>
    </div>
    
    <!-- Tariff Selection -->
    <div id="tariffSelection" style="margin-bottom: 16px;">
      <p style="margin: 0 0 12px 0; color: #374151; font-size: 14px;">
        <strong>Выберите тариф: 1, 5 или более специалистов?</strong>
      </p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn secondary ios-tariff-btn" onclick="selectTariff('SOLO', '690')">1 специалист</button>
        <button class="btn secondary ios-tariff-btn" onclick="selectTariff('STUDIO', '990')">5 специалистов</button>
        <button class="btn secondary ios-tariff-btn" onclick="selectTariff('PRO', '1490')">Более 5 специалистов</button>
      </div>
    </div>
    
    <!-- Payment Modal -->
    <div id="paymentModal" class="modal" style="display: none;">

        <div class="modal-header">
          <h3>Подписка на план специалистов</h3>
          <button class="modal-close" onclick="closePaymentModal()">&times;</button>
        </div>

            <p style="margin: 0 0 12px 0; color: #374151; font-size: 14px;">

            </p>
            <p style="margin: 0 0 12px 0; color: #666; font-size: 14px;">

            </p>
          </div>

            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Номер карты:</label>
            <input type="text" id="cardNumber" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Срок действия:</label>
            <input type="text" id="cardExpiry" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="MM/YY" maxlength="5">
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">CVV:</label>
            <input type="text" id="cardCVV" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" placeholder="123" maxlength="3">
          </div>

        </div>

    </div>
    
    <div class="items-grid" id="mastersGrid">
    </div>
  </section>

      <h2>Брендинг</h2>
    </div>
    
    <div class="branding-container">

<script src="/app.js?v=20260408"></script>
<script>
// Initialize specialist forms on page load
document.addEventListener('DOMContentLoaded', function() {
  // Initialize header
  if (typeof Bloknot !== 'undefined' && Bloknot.renderHeader) {
    Bloknot.renderHeader("settings");
  }
  
  const specialistLimit = localStorage.getItem('specialistLimit');
  if (specialistLimit) {
    updateSpecialistForms(parseInt(specialistLimit));
  } else {
    // Hide add specialist button if no tariff selected
    const addBtn = document.getElementById('addMasterBtn');
    if (addBtn) {
      addBtn.style.display = 'none';
    }
  }
});

// Tariff selection
function selectTariff(plan, price) {
  const planNames = {
    'SOLO': '1 специалист',
    'STUDIO': '5 специалистов',
    'PRO': 'Более 5 специалистов'
  };
  
  document.getElementById('selectedPlanName').textContent = planNames[plan];
  document.getElementById('selectedPlanPrice').textContent = price;
  document.getElementById('paymentModal').style.display = 'block';
}

function closePaymentModal() {
  document.getElementById('paymentModal').style.display = 'none';
}

function processPayment() {
  const cardNumber = document.getElementById('cardNumber').value;
  const cardExpiry = document.getElementById('cardExpiry').value;
  const cardCVV = document.getElementById('cardCVV').value;
  
  if (!cardNumber || !cardExpiry || !cardCVV) {
    document.getElementById('paymentError').textContent = 'Пожалуйста, заполните все данные карты';
    return;
  }
  
  // Mock payment processing
  setTimeout(() => {
    const planName = document.getElementById('selectedPlanName').textContent;
    const specialistLimit = planName.includes('1') ? 1 : planName.includes('5') ? 5 : 15;
    
    localStorage.setItem('specialistLimit', specialistLimit);
    localStorage.setItem('specialistPlan', planName);
    
    closePaymentModal();
    updateSpecialistForms(specialistLimit);
    
    alert('Оплата успешна! Теперь вы можете добавлять специалистов.');
  }, 1000);
}

function updateSpecialistForms(limit) {
  const grid = document.getElementById('mastersGrid');
  grid.innerHTML = '';
  
  for (let i = 1; i <= limit; i++) {
    const form = createSpecialistForm(i);
    grid.appendChild(form);
  }
  
  // Update add button
  const addBtn = document.getElementById('addMasterBtn');
  if (addBtn) {
    addBtn.style.display = limit > 0 ? 'none' : 'block';
  }
}

function createSpecialistForm(index) {
  const form = document.createElement('div');
  form.className = 'specialist-form';
  form.innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="field">
          <label>Имя:</label>
          <input type="text" id="specialistName${index}" placeholder="Введите имя специалиста">
        </div>
        <div class="field">
          <label>Email:</label>
          <input type="email" id="specialistEmail${index}" placeholder="Введите email адрес">
        </div>
        <div class="field">
          <label>Avatar:</label>
          <div class="avatar-upload" onclick="document.getElementById('specialistAvatar${index}').click()">
            <div class="avatar-circle">
              <div class="avatar-plus">+</div>
            </div>
            <input type="file" id="specialistAvatar${index}" accept="image/*" style="display: none;" onchange="handleAvatarSelect(${index}, this)">
          </div>
        </div>
        <div class="field">
          <button class="btn secondary" onclick="openScheduleSettings(${index})" style="width: 100%;">Настройки специалиста</button>
          </div>
        </div>
        <div class="action-buttons" style="margin-top: 8px;">
          <button class="btn secondary" onclick="inviteSpecialist(${index})" style="margin-right: 8px; font-size: 11px; padding: 4px 8px;">Пригласить</button>
<button class="btn secondary" onclick="deleteSpecialist(${index})" style="font-size: 11px; padding: 4px 8px;">Удалить</button>
        </div>
      </div>
    </div>
  `;
  return form;
}

async function saveSpecialist(index) {
  const specialistData = {
    name: document.getElementById(`specialistName${index}`).value,
    email: document.getElementById(`specialistEmail${index}`).value,
    phone: document.getElementById(`specialistPhone${index}`).value,
    avatar: document.getElementById(`specialistAvatar${index}`).files[0],
    schedule: localStorage.getItem(`specialistSchedule${index}`) || ''
  };
  
  try {
    // Save specialist to backend
    const response = await api('/api/specialists', {
      method: 'POST',
      body: JSON.stringify(specialistData)
    });
    
    alert('Специалист сохранен успешно!');
  } catch (error) {
    alert('Ошибка сохранения специалиста: ' + error.message);
  }
}

function openScheduleSettings(index) {
  // Open schedule settings page with specialist index
  window.location.href = `/specialist-schedule.html?specialist=${index}`;
}

function handleAvatarSelect(index, input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const avatarCircle = input.previousElementSibling;
      avatarCircle.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function handleLogoSelect(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const logoCircle = input.previousElementSibling;
      logoCircle.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function inviteSpecialist(index) {
  const email = document.getElementById(`specialistEmail${index}`).value;
  const name = document.getElementById(`specialistName${index}`).value;
  
  if (!email) {
    alert('Пожалуйста, укажите email специалиста');
    return;
  }
  
  try {
    // Send invitation email with link to main page
    const response = await api('/api/invite-specialist', {
      method: 'POST',
      body: JSON.stringify({
        email: email,
        name: name,
        businessName: 'Your Business',
        inviteLink: 'https://bloknotservis.ru',
        message: 'You have been invited as a specialist in our company. Please complete your registration.'
      })
    });
    
    alert(`Приглашение отправлено на ${email}`);
  } catch (error) {
    alert(`Ошибка отправки приглашения: ${error.message}`);
  }
}

// API helper
async function api(url, options = {}) {
  const defaultOptions = {
    headers: {
      'Content-Type': 'application/json',
    },
  };
  
  const finalOptions = { ...defaultOptions, ...options };
  
  if (finalOptions.body && typeof finalOptions.body === 'string') {
    finalOptions.body = finalOptions.body;
  }
  
  const response = await fetch(url, finalOptions);
  
  if (!response.ok) {
    throw new Error(`HTTP error! status: ${response.status}`);
  }
  
  return response.json();
}
