<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VK Авторизация - Ошибка</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      max-width: 400px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .error-icon {
      font-size: 48px;
      color: #dc3545;
      margin-bottom: 20px;
    }
    h1 {
      color: #333;
      margin-bottom: 15px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
    }
    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      word-wrap: break-word;
    }
    .btn {
      background: #007bff;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-icon">❌</div>
    <h1>Ошибка авторизации VK</h1>
    <p>Произошла ошибка при подключении аккаунта VK.</p>
    
    <div class="error-message" id="errorMessage">
      Ошибка авторизации. Попробуйте еще раз.
    </div>
    
    <a href="/" class="btn">Перейти на главную</a>
  </div>

  <script>
    // Получаем сообщение об ошибке из URL
    const urlParams = new URLSearchParams(window.location.search);
    const errorMessage = urlParams.get('message');

    if (errorMessage) {
      document.getElementById('errorMessage').textContent = decodeURIComponent(errorMessage);
      console.log('VK Auth error:', errorMessage);
    }
    
    // Если это было в окне бронирования, закрываем окно
    if (window.opener) {
      window.opener.postMessage({
        type: 'VK_AUTH_ERROR',
        error: errorMessage || 'Unknown error'
      }, '*');
      setTimeout(() => window.close(), 3000);
    }
  </script>
</body>
</html>
