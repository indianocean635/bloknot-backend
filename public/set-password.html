<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password - Bloknot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #5a67d8;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error {
      color: #e53e3e;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .success {
      color: #38a169;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Bloknot</div>
    <h1>Set Password</h1>
    <p class="subtitle">Create your password to access your account</p>
    
    <form id="setPasswordForm">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">Set Password</button>
      
      <div id="message"></div>
    </form>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (!token) {
      showMessage('Invalid link. Please request a new magic link.', 'error');
      document.getElementById('submitBtn').disabled = true;
    }

    // Verify token and get user info
    async function verifyToken() {
      try {
        const response = await fetch(`/api/auth/confirm?token=${token}`);
        const data = await response.json();
        
        if (data.status === 'SET_PASSWORD_REQUIRED') {
          // Token is valid, show form
          document.querySelector('.subtitle').textContent = `Create password for: ${data.user.email}`;
        } else if (data.status === 'LOGIN_SUCCESS') {
          // User already has password, redirect to dashboard
          window.location.href = '/dashboard.html';
        } else {
          showMessage('Invalid or expired link. Please request a new magic link.', 'error');
          document.getElementById('submitBtn').disabled = true;
        }
      } catch (error) {
        showMessage('Error verifying link. Please try again.', 'error');
        document.getElementById('submitBtn').disabled = true;
      }
    }

    // Handle form submission
    document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }
      
      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Setting password...';
      
      try {
        // First get user info from token
        const verifyResponse = await fetch(`/api/auth/confirm?token=${token}`);
        const verifyData = await verifyResponse.json();
        
        if (verifyData.status !== 'SET_PASSWORD_REQUIRED') {
          showMessage('Invalid request.', 'error');
          return;
        }
        
        // Set password
        const response = await fetch('/api/auth/set-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            userId: verifyData.user.id,
            password: password
          })
        });
        
        const data = await response.json();
        
        if (data.status === 'LOGIN_SUCCESS') {
          showMessage('Password set successfully! Redirecting...', 'success');
          // Store user info and redirect
          localStorage.setItem('bloknot_logged_in_email', data.user.email);
          localStorage.setItem('bloknot_user_id', data.user.id);
          localStorage.setItem('bloknot_business_id', data.user.businessId || '');
          
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showMessage('Error setting password. Please try again.', 'error');
        }
      } catch (error) {
        showMessage('Error setting password. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set Password';
      }
    });

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = type;
    }

    // Verify token on page load
    verifyToken();
  </script>
</body>
</html>
