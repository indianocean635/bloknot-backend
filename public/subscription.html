<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Подписка - Bloknot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="cache-control" content="no-cache, no-store, must-revalidate">
  <meta name="pragma" content="no-cache">
  <meta name="expires" content="0">
  <link rel="stylesheet" href="/styles.css?v=20260408" />
  <!-- CloudPayments Widget -->
  <script src="https://widget.cloudpayments.ru/bundles/cloudpayments"></script>
</head>
<body>

<div id="app-header"></div>

<main class="container">
  <h1 class="page-title">Подписка</h1>
  <p class="page-subtitle">Управление вашей подпиской на сервис</p>

  <!-- Subscription Info -->
  <div class="card" style="margin-top:12px;">
    <div id="subscriptionInfo" style="margin-bottom: 16px;">
      <div style="background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px;">
        <div id="subscriptionDetails">
          <p style="color: #6b7280; font-size: 14px;">Загрузка информации о подписке...</p>
        </div>
      </div>
    </div>

    <div id="subscriptionActions" style="display: none;">
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn secondary" id="changePlanBtn" style="font-size: 12px; padding: 6px 12px; height: auto;">Сменить тариф</button>
        <button class="btn secondary" id="cancelSubscriptionBtn" style="font-size: 12px; padding: 6px 12px; height: auto;">Отменить подписку</button>
      </div>
    </div>
  </div>

  </main>

<!-- Subscription Plans Modal -->
<div id="subscriptionPlansModal" class="modal" style="display: none;">
  <div class="modal-content" style="max-width: 600px;">
    <div class="modal-header">
      <h3>Выберите тариф</h3>
      <button class="modal-close" onclick="closeSubscriptionPlansModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="subscriptionPlans" style="display: grid; gap: 16px;">
        <!-- Plans will be loaded here -->
      </div>
    </div>
  </div>
</div>

<!-- CloudPayments Payment Modal -->
<div id="cloudPaymentsModal" class="modal" style="display: none;">
  <div class="modal-content" style="max-width: 400px;">
    <div class="modal-header">
      <h3>Оплата подписки</h3>
      <button class="modal-close" onclick="closeCloudPaymentsModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="selectedPlanInfo" style="margin-bottom: 20px;">
        <!-- Plan info will be shown here -->
      </div>
      <div id="cloudPaymentsWidget">
        <!-- CloudPayments widget will be initialized here -->
      </div>
    </div>
  </div>
</div>

<script>
  let subscriptionData = null;
  let selectedPlan = null;
  let currentUser = null;

  // Load user data and subscription info on page load
  document.addEventListener('DOMContentLoaded', function() {
    loadCurrentUser();
    loadSubscriptionInfo();
    setupSubscriptionEventListeners();
  });

  // Load current user data
  async function loadCurrentUser() {
    try {
      const response = await fetch('/api/auth/me');
      if (response.ok) {
        currentUser = await response.json();
        window.currentUser = currentUser;
      }
    } catch (error) {
      console.error('[SUBSCRIPTION] Error loading user:', error);
    }
  }

  // Setup event listeners
  function setupSubscriptionEventListeners() {
    document.getElementById('changePlanBtn').addEventListener('click', showSubscriptionPlans);
    document.getElementById('cancelSubscriptionBtn').addEventListener('click', cancelSubscription);
  }

  // Load subscription information
  async function loadSubscriptionInfo() {
    try {
      console.log('[SUBSCRIPTION] Loading subscription info...');
      
      const response = await fetch('/api/cloudpayments/subscription');
      const result = await response.json();

      if (result.success) {
        subscriptionData = result.data;
        displaySubscriptionInfo(subscriptionData);
      } else {
        console.error('[SUBSCRIPTION] Failed to load subscription info:', result.error);
        displaySubscriptionError('Не удалось загрузить информацию о подписке');
      }
    } catch (error) {
      console.error('[SUBSCRIPTION] Error loading subscription info:', error);
      displaySubscriptionError('Ошибка загрузки данных о подписке');
    }
  }

  
  // Display subscription information
  function displaySubscriptionInfo(data) {
    const detailsDiv = document.getElementById('subscriptionDetails');
    const actionsDiv = document.getElementById('subscriptionActions');

    const statusColors = {
      trial: '#3b82f6',
      active: '#10b981',
      cancelled: '#f59e0b',
      expired: '#ef4444'
    };

    const statusTexts = {
      trial: 'Пробный период',
      active: 'Активна',
      cancelled: 'Отменена',
      expired: 'Истекла'
    };

    let html = `
      <div style="display: grid; gap: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 500; color: #374151;">Тариф:</span>
          <span style="color: #1f2937;">${data.status === 'trial' ? 'Пробный период' : getPlanName(data.type)}</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 500; color: #374151;">Статус:</span>
          <span style="color: ${statusColors[data.status]}; font-weight: 500;">${statusTexts[data.status]}</span>
        </div>
    `;

    if (data.nextPaymentDate) {
      const nextPaymentDate = new Date(data.nextPaymentDate);
      html += `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 500; color: #374151;">Следующее списание:</span>
          <span style="color: #1f2937;">${nextPaymentDate.toLocaleDateString('ru-RU')}</span>
        </div>
      `;
    }

    if (data.trialEndsAt && data.status === 'trial') {
      const trialEndDate = new Date(data.trialEndsAt);
      const daysLeft = Math.floor((trialEndDate - new Date()) / (1000 * 60 * 60 * 24));
      const dayWord = getDayWord(daysLeft);
      html += `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 500; color: #374151;">Окончание пробного периода:</span>
          <span style="color: #1f2937;">${trialEndDate.toLocaleDateString('ru-RU')} (${daysLeft} ${dayWord})</span>
        </div>
      `;
    }

    if (data.subscriptionEndsAt) {
      const subscriptionEndDate = new Date(data.subscriptionEndsAt);
      html += `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 500; color: #374151;">Окончание доступа:</span>
          <span style="color: #1f2937;">${subscriptionEndDate.toLocaleDateString('ru-RU')}</span>
        </div>
      `;
    }

    html += '</div>';
    detailsDiv.innerHTML = html;

    // Show actions only for active subscriptions
    if (data.status === 'active' || data.status === 'trial') {
      actionsDiv.style.display = 'block';
    } else {
      actionsDiv.style.display = 'none';
    }
  }

  // Display subscription error
  function displaySubscriptionError(message) {
    const detailsDiv = document.getElementById('subscriptionDetails');
    detailsDiv.innerHTML = `
      <div style="color: #ef4444; font-size: 14px; text-align: center;">
        ${message}
      </div>
    `;
  }

  
  // Get plan name in Russian
  function getPlanName(type) {
    const planNames = {
      solo: 'Solo',
      studio: 'Studio',
      pro: 'Pro',
      trial: 'Пробный период',
      null: 'Без подписки',
      undefined: 'Без подписки'
    };
    return planNames[type] || planNames.trial;
  }

  // Get correct Russian word for days
  function getDayWord(days) {
    if (days === 1) return 'день';
    if (days >= 2 && days <= 4) return 'дня';
    return 'дней';
  }

  // Show subscription plans modal
  async function showSubscriptionPlans() {
    try {
      console.log('[SUBSCRIPTION] Loading subscription plans...');
      
      const response = await fetch('/api/cloudpayments/plans');
      const result = await response.json();

      if (result.success) {
        displaySubscriptionPlans(result.data);
        document.getElementById('subscriptionPlansModal').style.display = 'block';
      } else {
        alert('Не удалось загрузить тарифы');
      }
    } catch (error) {
      console.error('[SUBSCRIPTION] Error loading plans:', error);
      alert('Ошибка загрузки тарифов');
    }
  }

  // Display subscription plans
  function displaySubscriptionPlans(plans) {
    const plansDiv = document.getElementById('subscriptionPlans');
    
    plansDiv.innerHTML = plans.map(plan => `
      <div style="border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px; transition: all 0.2s;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
          <div>
            <h4 style="margin: 0 0 4px 0; color: #1f2937; font-size: 18px;">${plan.name}</h4>
            <p style="margin: 0; color: #6b7280; font-size: 14px;">${plan.description}</p>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 24px; font-weight: bold; color: #1f2937;">${plan.price}</div>
            <div style="font-size: 14px; color: #6b7280;">/${plan.period}</div>
          </div>
        </div>
        
        <div style="border-top: 1px solid #f3f4f6; padding-top: 12px; margin-bottom: 16px;">
          <ul style="margin: 0; padding-left: 20px; color: #374151; font-size: 14px;">
            ${plan.features.map(feature => `<li style="margin-bottom: 4px;">${feature}</li>`).join('')}
          </ul>
        </div>
        
        <div style="border-top: 1px solid #f3f4f6; padding-top: 12px;">
          <div style="margin-bottom: 12px;">
            <div style="font-size: 16px; font-weight: 500; color: #1f2937; margin-bottom: 8px;">Выберите период оплаты:</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
              <button class="btn secondary" onclick="selectBillingType('${plan.id}', 'monthly', '${plan.price}')" 
                      style="padding: 8px 12px; font-size: 14px;">
                Ежемесячно
                <div style="font-size: 12px; color: #6b7280; margin-top: 2px;">${plan.price}/${plan.period}</div>
              </button>
              
              <button class="btn primary" onclick="selectBillingType('${plan.id}', 'yearly', '${plan.yearlyPrice}')"
                      style="padding: 8px 12px; font-size: 14px;">
                Годовая оплата
                <div style="font-size: 12px; margin-top: 2px;">
                  <span style="text-decoration: line-through; color: #6b7280;">${parseInt(plan.price.replace(' ₽', '')) * 12} ₽</span>
                  <span style="color: #10b981; font-weight: bold;"> ${plan.yearlyPrice}</span>
                </div>
                <div style="font-size: 11px; color: #10b981; font-weight: 500;">Экономия ${plan.yearlyDiscount}</div>
              </button>
            </div>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn secondary" onclick="selectPaymentMethod('${plan.id}', 'monthly', 'card')" 
                    style="padding: 6px 12px; font-size: 12px;">
              💳 Привязать карту
            </button>
            <button class="btn secondary" onclick="selectPaymentMethod('${plan.id}', 'monthly', 'invoice')" 
                    style="padding: 6px 12px; font-size: 12px;">
              📄 По счету
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Select billing type
  function selectBillingType(planId, billingType, price) {
    console.log('[SUBSCRIPTION] Billing type selected:', { planId, billingType, price });
    
    // Store selected billing info
    window.selectedBilling = {
      planId: planId,
      billingType: billingType,
      price: price
    };
    
    // Update UI to show selection
    const buttons = document.querySelectorAll('button');
    buttons.forEach(btn => {
      if (btn.textContent.includes('Ежемесячно') || btn.textContent.includes('Годовая оплата')) {
        btn.classList.remove('primary');
        btn.classList.add('secondary');
      }
    });
    
    // Highlight selected button
    event.target.classList.remove('secondary');
    event.target.classList.add('primary');
  }

  // Select payment method
  function selectPaymentMethod(planId, billingType, paymentMethod) {
    console.log('[SUBSCRIPTION] Payment method selected:', { planId, billingType, paymentMethod });
    
    if (!window.selectedBilling) {
      // Auto-select monthly if no billing type selected
      window.selectedBilling = {
        planId: planId,
        billingType: 'monthly',
        price: '690 ₽'
      };
    }
    
    window.selectedBilling.paymentMethod = paymentMethod;
    
    if (paymentMethod === 'card') {
      // Show CloudPayments modal for card payment
      const plan = {
        id: planId,
        name: planId.split('-')[0].charAt(0).toUpperCase() + planId.split('-')[0].slice(1),
        price: window.selectedBilling.price,
        billingType: billingType
      };
      showCloudPaymentsModal(plan);
    } else if (paymentMethod === 'invoice') {
      // Show invoice modal
      showInvoiceModal(planId, billingType);
    }
  }

  // Show invoice modal
  function showInvoiceModal(planId, billingType) {
    const planName = planId.split('-')[0].charAt(0).toUpperCase() + planId.split('-')[0].slice(1);
    const price = window.selectedBilling.price;
    const period = billingType === 'yearly' ? 'год' : 'месяц';
    
    const modalHtml = `
      <div id="invoiceModal" class="modal" style="display: flex;">
        <div class="modal-content" style="max-width: 500px;">
          <div class="modal-header">
            <h3>Выставление счета</h3>
            <button class="modal-close" onclick="closeInvoiceModal()">&times;</button>
          </div>
          <div class="modal-body">
            <div style="background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="font-weight: 500;">Тариф:</span>
                <span>${planName}</span>
              </div>
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="font-weight: 500;">Период:</span>
                <span>${period}</span>
              </div>
              <div style="display: flex; justify-content: space-between;">
                <span style="font-weight: 500;">Сумма:</span>
                <span style="font-weight: bold; color: #1f2937;">${price}</span>
              </div>
            </div>
            
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email для отправки счета:</label>
              <input type="email" id="invoiceEmail" value="${currentUser?.email || ''}" 
                     style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" 
                     placeholder="email@example.com">
            </div>
            
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500;">Комментарий (необязательно):</label>
              <textarea id="invoiceComment" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-height: 80px;" 
                        placeholder="Дополнительная информация для счета"></textarea>
            </div>
            
            <div style="display: flex; gap: 8px;">
              <button class="btn primary" onclick="sendInvoiceRequest()">Отправить заявку</button>
              <button class="btn secondary" onclick="closeInvoiceModal()">Отмена</button>
            </div>
          </div>
        </div>
      </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  }

  // Send invoice request
  async function sendInvoiceRequest() {
    const email = document.getElementById('invoiceEmail').value;
    const comment = document.getElementById('invoiceComment').value;
    
    if (!email) {
      alert('Пожалуйста, укажите email для отправки счета');
      return;
    }
    
    try {
      console.log('[SUBSCRIPTION] Sending invoice request:', {
        planId: window.selectedBilling.planId,
        billingType: window.selectedBilling.billingType,
        email: email,
        comment: comment
      });
      
      // Here you would send request to backend
      alert(`Заявка на счет отправлена на email: ${email}\n\nТариф: ${window.selectedBilling.planId}\nПериод: ${window.selectedBilling.billingType}\nСумма: ${window.selectedBilling.price}`);
      
      closeInvoiceModal();
      closeSubscriptionPlansModal();
    } catch (error) {
      console.error('[SUBSCRIPTION] Error sending invoice request:', error);
      alert('Ошибка отправки заявки');
    }
  }

  // Close invoice modal
  function closeInvoiceModal() {
    const modal = document.getElementById('invoiceModal');
    if (modal) {
      modal.remove();
    }
  }

  // Select plan and start payment (legacy function)
  async function selectPlan(planId) {
    try {
      console.log('[SUBSCRIPTION] Plan selected:', planId);
      
      // Get plan details
      const response = await fetch('/api/cloudpayments/plans');
      const result = await response.json();
      
      if (result.success) {
        selectedPlan = result.data.find(plan => plan.id === planId);
        if (selectedPlan) {
          document.getElementById('subscriptionPlansModal').style.display = 'none';
          startCloudPaymentsPayment(selectedPlan);
        }
      }
    } catch (error) {
      console.error('[SUBSCRIPTION] Error selecting plan:', error);
      alert('Ошибка выбора тарифа');
    }
  }

  // Start CloudPayments payment
  function startCloudPaymentsPayment(plan) {
    console.log('[SUBSCRIPTION] Starting CloudPayments payment for plan:', plan);
    
    // Display selected plan info
    document.getElementById('selectedPlanInfo').innerHTML = `
      <div style="text-align: center; margin-bottom: 20px;">
        <h4 style="margin: 0 0 8px 0; color: #1f2937;">${plan.name}</h4>
        <p style="margin: 0; color: #6b7280;">${plan.description}</p>
        <div style="font-size: 24px; font-weight: bold; color: #1f2937; margin-top: 12px;">${plan.price}</div>
      </div>
    `;

    // Show payment modal
    document.getElementById('cloudPaymentsModal').style.display = 'block';

    // Initialize CloudPayments widget
    const widget = new cp.CloudPayments({
      language: 'ru',
      skin: 'modern'
    });

    // Get user data
    const userEmail = currentUser?.email || '';
    const userName = currentUser?.name || '';

    widget.charge({
      publicId: 'pk_...', // Will be set from environment
      description: `Подписка ${plan.name} для ${userName}`,
      amount: plan.price.replace(/[^\d]/g, ''), // Remove non-digit characters
      currency: 'RUB',
      accountId: currentUser?.id,
      email: userEmail,
      skin: 'modern',
      data: {
        planType: plan.id,
        userId: currentUser?.id,
        userEmail: userEmail,
        userName: userName
      }
    }, function(options) {
      // onSuccess callback
      console.log('[SUBSCRIPTION] Payment successful:', options);
      handlePaymentSuccess(options, plan);
    }, function(reason, options) {
      // onFail callback
      console.log('[SUBSCRIPTION] Payment failed:', reason, options);
      handlePaymentFailure(reason, options);
    });
  }

  // Handle payment success
  async function handlePaymentSuccess(options, plan) {
    try {
      console.log('[SUBSCRIPTION] Processing successful payment...');
      
      // Send payment data to backend
      const response = await fetch('/api/cloudpayments/subscription/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('authToken')}`
        },
        body: JSON.stringify({
          subscriptionType: plan.id,
          cardToken: options.token,
          userEmail: currentUser?.email,
          userName: currentUser?.name
        })
      });

      const result = await response.json();

      if (result.success) {
        alert('Подписка успешно оформлена!');
        document.getElementById('cloudPaymentsModal').style.display = 'none';
        loadSubscriptionInfo(); // Reload subscription info
      } else {
        alert('Ошибка оформления подписки: ' + result.error);
      }
    } catch (error) {
      console.error('[SUBSCRIPTION] Error processing payment success:', error);
      alert('Ошибка обработки платежа');
    }
  }

  // Handle payment failure
  function handlePaymentFailure(reason, options) {
    console.log('[SUBSCRIPTION] Payment failed:', reason);
    alert('Платеж не выполнен: ' + reason);
    document.getElementById('cloudPaymentsModal').style.display = 'none';
  }

  // Cancel subscription
  async function cancelSubscription() {
    if (!confirm('Вы уверены, что хотите отменить подписку? Доступ останется активным до окончания оплаченного периода.')) {
      return;
    }

    try {
      console.log('[SUBSCRIPTION] Cancelling subscription...');
      
      const response = await fetch('/api/cloudpayments/subscription/cancel', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('authToken')}`
        }
      });

      const result = await response.json();

      if (result.success) {
        alert(result.message);
        loadSubscriptionInfo(); // Reload subscription info
      } else {
        alert('Ошибка отмены подписки: ' + result.error);
      }
    } catch (error) {
      console.error('[SUBSCRIPTION] Error cancelling subscription:', error);
      alert('Ошибка отмены подписки');
    }
  }

  // Close subscription plans modal
  function closeSubscriptionPlansModal() {
    document.getElementById('subscriptionPlansModal').style.display = 'none';
  }

  // Close CloudPayments modal
  function closeCloudPaymentsModal() {
    document.getElementById('cloudPaymentsModal').style.display = 'none';
  }

  // Close modals on background click
  document.addEventListener('click', function(event) {
    if (event.target.classList.contains('modal')) {
      event.target.style.display = 'none';
    }
  });
</script>

  if (typeof Bloknot !== 'undefined') {
    Bloknot.renderHeader("dashboard");

</script>
