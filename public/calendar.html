  <style>
    /* CRM Calendar Styles */
    .crm-calendar {
      display: flex;
      height: calc(100vh - 72px);
      background: #f8fafc;

    .crm-sidebar {

      background: white;
      border-right: 1px solid #e2e8f0;
      padding: 20px;
      flex-shrink: 0;
      overflow-y: auto;

      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .crm-toolbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .crm-toolbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .crm-toolbar-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .crm-toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .crm-calendar-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 60px 1fr;
      overflow: hidden;
      background: #f7f8fa;
    }

    .crm-employee-headers {
      grid-column: 2;
      display: flex;
      border-bottom: 1px solid #e2e8f0;
      background: white;
      position: sticky;
      top: 0;

      gap: 12px;
      background: white;

      background: #f8fafc;
    }

    .crm-header-today {
      background: #f0f9ff;
      border-left: 3px solid #3b82f6;
    }

    .crm-column-today {

      font-size: 14px;

    .crm-time-column {

      border-right: 1px solid #e2e8f0;

    .crm-employee-columns {

    .crm-employee-column {

      border-right: 1px solid #e2e8f0;
      position: relative;
      background: white;

    }

    .crm-time-slot-row {
      height: 60px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .crm-time-slot-row::before {
      content: '';

      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: #e2e8f0;

    .crm-time-slot-row.closed::after {

      right: 0;

  <script>
    Bloknot.renderHeader('calendar');

    const state = {
      view: 'week',
      currentDate: new Date(),
      miniCalendarDate: new Date(),
      selectedMaster: null,
      selectedBranch: null,
      selectedStaffIds: [], // Array of selected staff IDs
      bookings: [],
      masters: [],
      masterSchedules: {},
      services: [],
      selectedBooking: null,
      selectedColor: 'green'
    };

    function ymd(d) {
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function startOfWeek(d) {
      const x = new Date(d);
      const day = x.getDay();
      const diff = x.getDate() - day + (day === 0 ? -6 : 1);
      x.setDate(diff);
      return startOfDay(x);
    }

    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0);
    }

    function addDays(d, n) {
      const x = new Date(d);
      x.setDate(x.getDate() + n);
      return x;
    }

    function addWeeks(d, n) {
      return addDays(d, n * 7);
    }

    function fmtDateRu(d) {
      return d.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
    }

    function fmtDayRu(d) {
      return d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function renderMiniCalendar() {
      const grid = document.getElementById('miniCalendarGrid');
      const title = document.getElementById('miniCalendarTitle');
      const year = state.miniCalendarDate.getFullYear();
      const month = state.miniCalendarDate.getMonth();

      title.textContent = state.miniCalendarDate.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDay = firstDay.getDay() || 7;
      const today = new Date();

      let html = '';
      
      // Days of week
      const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      days.forEach(day => {
        html += `<div class="crm-mini-calendar-day" style="font-weight: 600; color: #64748b;">${day}</div>`;
      });

      // Empty cells before first day
      for (let i = 1; i < startDay; i++) {
        html += `<div class="crm-mini-calendar-day other-month"></div>`;
      }

      // Days of month
      for (let day = 1; day <= lastDay.getDate(); day++) {
        const date = new Date(year, month, day);
        const isToday = date.toDateString() === today.toDateString();
        const isSelected = date.toDateString() === state.currentDate.toDateString();
        const classes = ['crm-mini-calendar-day'];
        if (isToday) classes.push('today');
        if (isSelected) classes.push('selected');
        html += `<div class="${classes.join(' ')}" data-date="${ymd(date)}">${day}</div>`;
      }

      grid.innerHTML = html;

      grid.querySelectorAll('.crm-mini-calendar-day[data-date]').forEach(el => {
        el.addEventListener('click', () => {
          state.currentDate = new Date(el.dataset.date);
          renderMiniCalendar();
          renderCalendar();
        });
      });
    }

    function renderTimeColumn() {
      const column = document.getElementById('timeColumn');
      let html = '';
      for (let hour = 9; hour <= 21; hour++) {
        html += `<div class="crm-time-slot">${String(hour).padStart(2, '0')}:00</div>`;
      }
      column.innerHTML = html;
    }

    function renderEmployeeHeaders() {
      const headers = document.getElementById('employeeHeaders');
      
      if (state.view === 'week') {
        // Show day headers for week view
        const weekStart = startOfWeek(state.currentDate);
        const dayNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
        
        let html = '<div class="crm-time-column"></div>';
        for (let i = 0; i < 7; i++) {
          const day = addDays(weekStart, i);
          const dayName = dayNames[i];
          const dayDate = day.getDate();
          const isToday = day.toDateString() === new Date().toDateString();
          
          html += `
            <div class="crm-employee-header ${isToday ? 'crm-header-today' : ''}">
              <div class="crm-employee-info">
                <div class="crm-employee-name">${dayName}</div>
                <div class="crm-employee-role">${dayDate}</div>
              </div>
            </div>
          `;
        }
        headers.innerHTML = html;
      } else {
        // Show staff headers for day view
        const visibleMasters = state.selectedMaster 
          ? state.masters.filter(m => String(m.id) === String(state.selectedMaster))
          : state.selectedStaffIds.length === 0 
            ? []
            : state.masters.filter(m => state.selectedStaffIds.includes(m.id));

        let html = '<div class="crm-time-column"></div>';
        visibleMasters.forEach(master => {
          const avatarHtml = master.avatar 
            ? `<img src="${master.avatar}" alt="${master.name}" />`
            : master.name.charAt(0);
          
          html += `
            <div class="crm-employee-header">
              <div class="crm-employee-avatar">${avatarHtml}</div>
              <div class="crm-employee-info">
                <div class="crm-employee-name">${master.name}</div>
                <div class="crm-employee-role">${master.specializations || 'Мастер'}</div>
              </div>
            </div>
          `;
        });
        headers.innerHTML = html;
      }
    }

    function renderScheduleColumns() {
      const container = document.getElementById('scheduleColumns');
      
      if (state.view === 'week') {
        // Week view: show 7 day columns
        const weekStart = startOfWeek(state.currentDate);
        let html = '';
        
        for (let i = 0; i < 7; i++) {
          const day = addDays(weekStart, i);
          const isToday = day.toDateString() === new Date().toDateString();
          html += `<div class="crm-employee-column ${isToday ? 'crm-column-today' : ''}" data-day="${day.toISOString()}">`;
          
          for (let hour = 9; hour <= 21; hour++) {
            html += `<div class="crm-time-slot-row" data-hour="${hour}" data-day="${i}"></div>`;
          }
          html += '</div>';
        }
        container.innerHTML = html;

        // Render bookings for each day
        const visibleMasters = state.selectedMaster 
          ? state.masters.filter(m => String(m.id) === String(state.selectedMaster))
          : state.selectedStaffIds.length === 0 
            ? []
            : state.masters.filter(m => state.selectedStaffIds.includes(m.id));

        for (let i = 0; i < 7; i++) {
          const day = addDays(weekStart, i);
          const dayStart = startOfDay(day);
          const dayEnd = endOfDay(day);
          const column = container.querySelector(`[data-day="${day.toISOString()}"]`);
          
          // Filter bookings for this day
          const dayBookings = state.bookings.filter(b => {
            const bookingDate = new Date(b.startsAt);
            return bookingDate >= dayStart && bookingDate <= dayEnd &&
                   (state.selectedMaster ? String(b.masterId) === String(state.selectedMaster) : true) &&
                   (state.selectedStaffIds.length > 0 ? state.selectedStaffIds.includes(String(b.masterId)) : true);
          });

          dayBookings.forEach(booking => {
            const startDate = new Date(booking.startsAt);
            const endDate = new Date(booking.endsAt);
            const startHour = startDate.getHours();
            const startMin = startDate.getMinutes();
            const duration = (endDate.getTime() - startDate.getTime()) / 60000;
            
            const slotHeight = 60;
            const top = (startHour - 9) * slotHeight + (startMin / 60) * slotHeight;
            const height = (duration / 60) * slotHeight;

            const service = state.services.find(s => String(s.id) === String(booking.serviceId));
            const master = state.masters.find(m => String(m.id) === String(booking.masterId));
            
            // Determine color based on status
            let colorClass = 'green';
            if (booking.status === 'CONFIRMED') {
              colorClass = 'confirmed';
            } else if (booking.status === 'COMPLETED') {
              colorClass = 'completed';
            } else if (booking.status === 'CANCELLED') {
              colorClass = 'cancelled';
            } else if (booking.status === 'PENDING') {
              colorClass = 'new';
            } else {
              colorClass = booking.color || 'green';
            }

            const card = document.createElement('div');
            card.className = `crm-booking-card ${colorClass}`;
            card.style.top = `${top}px`;
            card.style.height = `${Math.max(height, 40)}px`;
            card.dataset.bookingId = booking.id;
            card.innerHTML = `
              <div class="crm-booking-time">${fmtTime(booking.startsAt)} – ${fmtTime(booking.endsAt)}</div>
              <div class="crm-booking-client">${booking.customerName}</div>
              <div class="crm-booking-service">${service?.name || ''}</div>
              <div class="crm-booking-phone">${master?.name || ''}</div>
            `;
            card.addEventListener('click', (e) => {
              e.stopPropagation();
              openBookingModal(booking);
            });
            column.appendChild(card);
          });
        }

        // Add click handlers for time slots
        container.querySelectorAll('.crm-time-slot-row').forEach(slot => {
          slot.addEventListener('click', () => {
            const dayIndex = parseInt(slot.dataset.day);
            const hour = parseInt(slot.dataset.hour);
            const day = addDays(weekStart, dayIndex);
            openBookingModal(null, { date: day, hour });
          });
        });

        // Add current time line for today
        const todayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        const todayColumn = container.querySelector(`[data-day="${addDays(weekStart, todayIndex).toISOString()}"]`);
        if (todayColumn) {
          renderCurrentTimeLine(todayColumn);
        }
      } else {
        // Day view: show staff columns
        const visibleMasters = state.selectedMaster 
          ? state.masters.filter(m => String(m.id) === String(state.selectedMaster))
          : state.selectedStaffIds.length === 0 
            ? []
            : state.masters.filter(m => state.selectedStaffIds.includes(m.id));

        let html = '';
        visibleMasters.forEach(master => {
          html += `<div class="crm-employee-column" data-master-id="${master.id}">`;
          for (let hour = 9; hour <= 21; hour++) {
            html += `<div class="crm-time-slot-row" data-hour="${hour}" data-master="${master.id}"></div>`;
          }
          html += '</div>';
        });
        container.innerHTML = html;

        // Render bookings
        visibleMasters.forEach(master => {
          const column = container.querySelector(`[data-master-id="${master.id}"]`);
          const masterBookings = state.bookings.filter(b => {
            const bookingDate = new Date(b.startsAt);
            const currentDate = state.currentDate;
            return bookingDate.toDateString() === currentDate.toDateString() &&
                   String(b.masterId) === String(master.id);
          });

          masterBookings.forEach(booking => {
            const startDate = new Date(booking.startsAt);
            const endDate = new Date(booking.endsAt);
            const startHour = startDate.getHours();
            const startMin = startDate.getMinutes();
            const duration = (endDate.getTime() - startDate.getTime()) / 60000;
            
            const slotHeight = 60;
            const top = (startHour - 9) * slotHeight + (startMin / 60) * slotHeight;
            const height = (duration / 60) * slotHeight;

            const service = state.services.find(s => String(s.id) === String(booking.serviceId));
            
            // Determine color based on status
            let colorClass = 'green';
            if (booking.status === 'CONFIRMED') {
              colorClass = 'confirmed';
            } else if (booking.status === 'COMPLETED') {
              colorClass = 'completed';
            } else if (booking.status === 'CANCELLED') {
              colorClass = 'cancelled';
            } else if (booking.status === 'PENDING') {
              colorClass = 'new';
            } else {
              colorClass = booking.color || 'green';
            }

            const card = document.createElement('div');
            card.className = `crm-booking-card ${colorClass}`;
            card.style.top = `${top}px`;
            card.style.height = `${Math.max(height, 40)}px`;
            card.dataset.bookingId = booking.id;
            card.innerHTML = `
              <div class="crm-booking-time">${fmtTime(booking.startsAt)} – ${fmtTime(booking.endsAt)}</div>
              <div class="crm-booking-client">${booking.customerName}</div>
              <div class="crm-booking-service">${service?.name || ''}</div>
              ${booking.customerPhone ? `<div class="crm-booking-phone">${booking.customerPhone}</div>` : ''}
            `;
            card.addEventListener('click', (e) => {
              e.stopPropagation();
              openBookingModal(booking);
            });
            column.appendChild(card);
          });
        });

        // Mark closed slots based on schedule
        const dayOfWeek = state.currentDate.getDay();
        const dayName = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'][dayOfWeek];

        container.querySelectorAll('.crm-time-slot-row').forEach(slot => {
          const hour = parseInt(slot.dataset.hour);
          const masterId = slot.dataset.master;
          const schedule = state.masterSchedules[masterId] || {};
          
          const daySchedule = schedule[dayName];
          if (daySchedule) {
            const isClosed = daySchedule.closed || 
                             (daySchedule.start && hour < parseInt(daySchedule.start.split(':')[0])) ||
                             (daySchedule.end && hour >= parseInt(daySchedule.end.split(':')[0]));
            
            if (isClosed) {
              slot.classList.add('closed');
            }
          }

          if (!slot.classList.contains('closed')) {
            slot.addEventListener('click', () => {
              openBookingModal(null, { masterId, hour });
            });
          }
        });

        // Add current time line
        renderCurrentTimeLine(container);
      }
    }

    function renderCurrentTimeLine(container) {
      // Remove existing time line
      const existingLine = container.querySelector('.crm-current-time-line');
      if (existingLine) {
        existingLine.remove();
      }

      const now = new Date();
      const currentHour = now.getHours();
      const currentMin = now.getMinutes();
      
      // Only show if within our time range (9-21)
      if (currentHour >= 9 && currentHour <= 21) {
        const slotHeight = 60;
        const top = (currentHour - 9) * slotHeight + (currentMin / 60) * slotHeight;
        
        const timeLine = document.createElement('div');
        timeLine.className = 'crm-current-time-line';
        timeLine.style.top = `${top}px`;
        container.appendChild(timeLine);
      }
    }

    function renderCalendar() {
      const dateDisplay = document.getElementById('dateDisplay');
      
      if (state.view === 'week') {
        const weekStart = startOfWeek(state.currentDate);
        const weekEnd = addDays(weekStart, 6);
        dateDisplay.textContent = `${fmtDayRu(weekStart)} – ${fmtDayRu(weekEnd)}`;
      } else {
        dateDisplay.textContent = fmtDayRu(state.currentDate);
      }

      renderTimeColumn();
      renderEmployeeHeaders();
      renderScheduleColumns();
    }

    async function loadMasters() {
      try {
        state.masters = await Bloknot.api('/api/masters/masters');
        
        // Initially select all staff
        state.selectedStaffIds = state.masters.map(m => m.id);

        // Populate staff dropdown
        const staffList = document.getElementById('staffList');
        staffList.innerHTML = '';
        state.masters.forEach(master => {
          const item = document.createElement('div');
          item.className = 'crm-staff-item';
          item.dataset.staffId = master.id;
          item.innerHTML = `
            <div class="crm-staff-checkbox checked"></div>
            <span class="crm-staff-name">${master.name}</span>
          `;
          item.addEventListener('click', () => toggleStaffSelection(master.id));
          staffList.appendChild(item);
        });

        // Populate master filter dropdown
        const masterFilter = document.getElementById('masterFilter');
        masterFilter.innerHTML = '<option value="">Все мастера</option>';
        state.masters.forEach(m => {
          masterFilter.innerHTML += `<option value="${m.id}">${m.name}</option>`;
        });

        // Load schedules for each master
        for (const master of state.masters) {
          try {
            const scheduleData = await Bloknot.api(`/api/specialists/${master.id}/schedule`);
            state.masterSchedules[master.id] = scheduleData.schedule || {};
          } catch (e) {
            console.error(`Failed to load schedule for master ${master.id}:`, e);
            state.masterSchedules[master.id] = {};
          }
        }
      } catch (e) {
        console.error('Failed to load masters:', e);
      }
    }

    function toggleStaffSelection(staffId) {
      const index = state.selectedStaffIds.indexOf(staffId);
      
      if (index > -1) {
        state.selectedStaffIds.splice(index, 1);
      } else {
        state.selectedStaffIds.push(staffId);
      }

      // Update checkbox visual state
      document.querySelector(`[data-staff-id="${staffId}"] .crm-staff-checkbox`).classList.toggle('checked');

      renderCalendar();
      loadBookings();
    }

    async function loadServices() {
      try {
        state.services = await Bloknot.api('/api/masters/services');
        const select = document.getElementById('bookingService');
        select.innerHTML = '';
        state.services.forEach(s => {
          select.innerHTML += `<option value="${s.id}">${s.name} · ${s.duration} мин</option>`;
        });
      } catch (e) {
        console.error('Failed to load services:', e);
      }
    }

    async function loadBookings() {
      try {
        const weekStart = state.view === 'week' ? startOfWeek(state.currentDate) : startOfDay(state.currentDate);
        const weekEnd = addDays(weekStart, state.view === 'week' ? 7 : 1);
        
        const qs = new URLSearchParams({
          from: weekStart.toISOString(),
          to: weekEnd.toISOString()
        });

        if (state.selectedStaffIds.length > 0) {
          qs.set('masterId', state.selectedStaffIds.join(','));
        }

        state.bookings = await Bloknot.api('/api/appointments?' + qs.toString());
        renderCalendar();
      } catch (e) {
        console.error('Failed to load bookings:', e);
      }
    }

    function openBookingModal(booking = null, slotInfo = null) {
      const modal = document.getElementById('bookingModal');
      const form = document.getElementById('bookingForm');
      const title = document.getElementById('modalTitle');
      const deleteBtn = document.getElementById('deleteBookingBtn');

      state.selectedBooking = booking;

      if (booking) {
        title.textContent = 'Редактировать запись';
        document.getElementById('bookingClient').value = booking.customerName;
        document.getElementById('bookingPhone').value = booking.customerPhone || '';
        document.getElementById('bookingService').value = booking.serviceId;
        document.getElementById('bookingMaster').value = booking.masterId;
        document.getElementById('bookingDate').value = ymd(new Date(booking.startsAt));
        document.getElementById('bookingTime').value = fmtTime(new Date(booking.startsAt)).substring(0, 5);
        document.getElementById('bookingComment').value = booking.comment || '';
        document.getElementById('bookingStatus').value = booking.status || 'confirmed';
        deleteBtn.style.display = 'block';
      } else {
        title.textContent = 'Новая запись';
        form.reset();
        if (slotInfo) {
          document.getElementById('bookingMaster').value = slotInfo.masterId;
          document.getElementById('bookingDate').value = ymd(state.currentDate);
          document.getElementById('bookingTime').value = `${String(slotInfo.hour).padStart(2, '0')}:00`;
        }
        deleteBtn.style.display = 'none';
      }

      modal.classList.add('active');
    }

    function closeBookingModal() {
      const modal = document.getElementById('bookingModal');
      modal.classList.remove('active');
      state.selectedBooking = null;
    }

    async function saveBooking(e) {
      e.preventDefault();
      
      const data = {
        customerName: document.getElementById('bookingClient').value,
        customerPhone: document.getElementById('bookingPhone').value,
        serviceId: document.getElementById('bookingService').value,
        masterId: document.getElementById('bookingMaster').value,
        startsAt: new Date(`${document.getElementById('bookingDate').value}T${document.getElementById('bookingTime').value}`).toISOString(),
        comment: document.getElementById('bookingComment').value,
        color: state.selectedColor,
        status: document.getElementById('bookingStatus').value
      };

      try {
        if (state.selectedBooking) {
          await Bloknot.api(`/api/appointments/${state.selectedBooking.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        } else {
          await Bloknot.api('/api/appointments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
        }
        closeBookingModal();
        await loadBookings();
      } catch (err) {
        alert('Ошибка сохранения: ' + err.message);
      }
    }

    async function deleteBooking() {
      if (!state.selectedBooking) return;
      if (!confirm('Удалить запись?')) return;

      try {
        await Bloknot.api(`/api/appointments/${state.selectedBooking.id}`, { method: 'DELETE' });
        closeBookingModal();
        await loadBookings();
      } catch (err) {
        alert('Ошибка удаления: ' + err.message);
      }
    }

    // Event listeners
    document.getElementById('miniCalendarPrev').addEventListener('click', () => {
      state.miniCalendarDate.setMonth(state.miniCalendarDate.getMonth() - 1);
      renderMiniCalendar();
    });

    document.getElementById('miniCalendarNext').addEventListener('click', () => {
      state.miniCalendarDate.setMonth(state.miniCalendarDate.getMonth() + 1);
      renderMiniCalendar();
    });

    document.getElementById('prevWeek').addEventListener('click', () => {
      state.currentDate = state.view === 'week' ? addWeeks(state.currentDate, -1) : addDays(state.currentDate, -1);
      renderCalendar();
      loadBookings();
    });

    document.getElementById('nextWeek').addEventListener('click', () => {
      state.currentDate = state.view === 'week' ? addWeeks(state.currentDate, 1) : addDays(state.currentDate, 1);
      renderCalendar();
      loadBookings();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      state.currentDate = new Date();
      state.miniCalendarDate = new Date();
      renderMiniCalendar();
      renderCalendar();
      loadBookings();
    });

    document.getElementById('dayViewBtn').addEventListener('click', () => {
      state.view = 'day';
      document.getElementById('dayViewBtn').classList.add('crm-btn-primary');
      document.getElementById('weekViewBtn').classList.remove('crm-btn-primary');
      renderCalendar();
      loadBookings();
    });

    document.getElementById('weekViewBtn').addEventListener('click', () => {
      state.view = 'week';
      document.getElementById('weekViewBtn').classList.add('crm-btn-primary');
      document.getElementById('dayViewBtn').classList.remove('crm-btn-primary');
      renderCalendar();
      loadBookings();
    });

    document.getElementById('masterFilter').addEventListener('change', (e) => {
      state.selectedMaster = e.target.value || null;
      renderCalendar();
      loadBookings();
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      loadBookings();
    });

    // Staff dropdown toggle
    document.getElementById('staffMenuItem').addEventListener('click', () => {
      document.getElementById('staffDropdown').classList.toggle('active');
    });

    document.getElementById('modalClose').addEventListener('click', closeBookingModal);
    document.getElementById('cancelBookingBtn').addEventListener('click', closeBookingModal);
    document.getElementById('deleteBookingBtn').addEventListener('click', deleteBooking);
    document.getElementById('bookingForm').addEventListener('submit', saveBooking);

    document.querySelectorAll('.crm-color-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.crm-color-option').forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        state.selectedColor = option.dataset.color;
      });
    });

    // Initialize
    (async function init() {
      await loadMasters();
      await loadServices();
      await loadBookings();
      renderMiniCalendar();
      renderCalendar();

      // Populate master select in modal
      const masterSelect = document.getElementById('bookingMaster');
      state.masters.forEach(m => {
        masterSelect.innerHTML += `<option value="${m.id}">${m.name}</option>`;
      });
    })();
  </script>
</body>
</html>
