<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Онлайн запись v2.1 - Fixed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1f2937;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .booking-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .booking-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .booking-header {
      background: white;
      color: #333;
      padding: 16px 32px;
      text-align: left;
      position: relative;
      border-bottom: 1px solid #e5e7eb;
    }

    .business-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .business-logo-header {
      flex-shrink: 0;
    }

    #business-logo-header-container {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e5e7eb;
    }

    #business-logo-header {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .no-logo-header-text {
      font-size: 10px;
      color: #6b7280;
      text-align: center;
    }

    .business-details {
      flex: 1;
    }

    .business-name {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      color: #1f2937;
    }

    .business-meta {
      font-size: 14px;
      color: #6b7280;
      margin: 4px 0 0 0;
    }

    .steps-container {
      padding: 32px;
    }

    .step-item {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      align-items: flex-start;
    }

    .step-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .icon-branch { background: #fef3c7; }
    .icon-service { background: #dbeafe; }
    .icon-master { background: #fce7f3; }
    .icon-datetime { background: #e0e7ff; }
    .icon-customer { background: #f0fdf4; }

    .step-content {
      flex: 1;
    }

    .step-label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
    }

    .step-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    .step-input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .datetime-container {
      display: flex;
      gap: 12px;
    }

    .datetime-container input {
      flex: 1;
    }

    .submit-section {
      padding: 0 32px 32px;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #2563eb;
    }

    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .works-section {
      margin: 32px 0;
      padding: 0 32px;
    }

    .works-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #374151;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .work-item {
      border-radius: 8px;
      overflow: hidden;
      background: #f9fafb;
    }

    .work-item img,
    .work-item video {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .loading {
      text-align: center;
      padding: 60px 32px;
      color: #6b7280;
      font-size: 18px;
    }

    .error {
      text-align: center;
      padding: 60px 32px;
      color: #ef4444;
      font-size: 18px;
    }

    .footer {
      text-align: center;
      padding: 32px;
      margin-top: 40px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
    }

    @media (max-width: 768px) {
      .booking-header {
        padding: 12px 16px;
      }

      .business-info {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      #business-logo-header-container {
        width: 50px;
        height: 50px;
      }

      .business-name {
        font-size: 20px;
      }

      .steps-container {
        padding: 24px 16px;
      }

      .datetime-container {
        flex-direction: column;
      }

      .works-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="booking-container">
      <div class="booking-card">
        <div class="booking-header">
          <div class="business-info">
            <div class="business-logo-header">
              <div id="business-logo-header-container">
                <img id="business-logo-header" src="" alt="Logo" style="display: none;">
                <div class="no-logo-header-text" style="display: none;">Нет логотипа</div>
              </div>
            </div>
            <div class="business-details">
              <h1 class="business-name" id="business-name">Загрузка...</h1>
              <p class="business-meta" id="business-meta">Загрузка...</p>
            </div>
          </div>
        </div>
        <div id="booking-content">
          <div class="loading">Загрузка данных...</div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-text">Сервис онлайн записи</div>
  </footer>

  <script>
    console.log('🚀 Booking form v2.1 - All template literals fixed!');
    
    // Prevent auto-scroll immediately
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
    
    // Prevent focus-induced scroll
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    // Get slug from URL
    const pathParts = window.location.pathname.split('/').filter(part => part);
    const slug = pathParts[pathParts.length - 1];
    
    console.log('Current path:', window.location.pathname);
    console.log('Path parts:', pathParts);
    console.log('Extracted slug:', slug);
    
    if (!slug || slug === 'book-template' || slug === 'book') {
      document.getElementById('booking-content').innerHTML = '<div class="error">Бизнес не найден. Неверная ссылка.</div>';
    } else {
      loadBookingData();
    }

    // Prevent scroll after initial load
    setTimeout(() => {
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;
    }, 100);

    async function loadBookingData() {
      try {
        console.log('Loading booking data for slug:', slug);
        
        // Load business info
        console.log('Fetching business data...');
        const businessResponse = await fetch('/api/public/business?slug=' + slug);
        console.log('Business response status:', businessResponse.status);
        
        if (businessResponse.ok) {
          const business = await businessResponse.json();
          console.log('Business data received:', business);
          
          // Load company name
          const businessNameElement = document.getElementById('business-name');
          console.log('Company name data:', business.name);
          console.log('Business name element:', businessNameElement);
          if (business.name && businessNameElement) {
            businessNameElement.textContent = business.name;
            console.log('Company name set to:', business.name);
          } else {
            console.log('No company name found or element missing');
          }
          
          // Load logo for header
          const logoHeaderElement = document.getElementById('business-logo-header');
          const logoHeaderContainer = document.getElementById('business-logo-header-container');
          
          console.log('Logo data:', business.logo);
          console.log('Logo header element:', logoHeaderElement);
          console.log('Logo header container:', logoHeaderContainer);
          
          if (business.logo && logoHeaderElement && logoHeaderContainer) {
            logoHeaderElement.src = business.logo;
            logoHeaderElement.style.display = 'block';
            const noLogoHeaderText = logoHeaderContainer.querySelector('.no-logo-header-text');
            if (noLogoHeaderText) {
              noLogoHeaderText.style.display = 'none';
            }
            console.log('Logo loaded successfully in header');
          } else if (logoHeaderContainer) {
            const logoImg = logoHeaderContainer.querySelector('#business-logo-header');
            if (logoImg) {
              logoImg.style.display = 'none';
            }
            const noLogoHeaderText = logoHeaderContainer.querySelector('.no-logo-header-text');
            if (noLogoHeaderText) {
              noLogoHeaderText.style.display = 'block';
            }
            console.log('No logo found, showing placeholder in header');
          }
          
          // Set business meta
          const businessMetaElement = document.getElementById('business-meta');
          if (businessMetaElement) {
            let metaText = '';
            if (business.address) metaText += business.address;
            if (business.phone) {
              if (metaText) metaText += ' • ';
              metaText += business.phone;
            }
            businessMetaElement.textContent = metaText || 'Информация о бизнесе';
          }
        } else {
          const errorText = await businessResponse.text();
          console.error('Business API error:', businessResponse.status, errorText);
          document.getElementById('booking-content').innerHTML = '<div class="error">Ошибка загрузки данных бизнеса</div>';
          return;
        }

        // Load branches, services, masters and works
        console.log('Loading branches, services, masters, works...');
        
        const [branches, services, masters, works] = await Promise.all([
          fetch('/api/public/branches?slug=' + slug).then(r => {
            console.log('Branches response status:', r.status);
            if (!r.ok) throw new Error('Branches API error: ' + r.status);
            return r.json();
          }),
          fetch('/api/public/services?slug=' + slug).then(r => {
            console.log('Services response status:', r.status);
            if (!r.ok) throw new Error('Services API error: ' + r.status);
            return r.json();
          }),
          fetch('/api/public/masters?slug=' + slug).then(r => {
            console.log('Masters response status:', r.status);
            if (!r.ok) throw new Error('Masters API error: ' + r.status);
            return r.json();
          }),
          fetch('/api/public/works?slug=' + slug).then(r => {
            console.log('Works response status:', r.status);
            if (!r.ok) throw new Error('Works API error: ' + r.status);
            return r.json();
          })
        ]);

        console.log('Data loaded successfully:', {
          branches: branches.length,
          services: services.length,
          masters: masters.length,
          works: works.length
        });

        renderBookingForm(branches, services, masters, works);
      } catch (error) {
        console.error('Error loading booking data:', error);
        document.getElementById('booking-content').innerHTML = '<div class="error">Ошибка загрузки данных. Пожалуйста, попробуйте позже.</div>';
      }
    }

    function renderBookingForm(branches, services, masters, works) {
      const hasBranches = branches && branches.length > 0;
      
      let formHtml = '<div class="steps-container">';
      
      // Add branch step if exists
      if (hasBranches) {
        formHtml += '<div class="step-item">';
        formHtml += '<div class="step-icon icon-branch">📍</div>';
        formHtml += '<div class="step-content">';
        formHtml += '<div class="step-label">Филиал</div>';
        formHtml += '<select id="branch" class="step-input" required>';
        formHtml += '<option value="">Выберите филиал</option>';
        branches.forEach(function(branch) {
          formHtml += '<option value="' + branch.id + '">' + branch.name + (branch.address ? ' - ' + branch.address : '') + '</option>';
        });
        formHtml += '</select>';
        formHtml += '</div>';
        formHtml += '</div>';
      }
      
      // Add service step
      formHtml += '<div class="step-item">';
      formHtml += '<div class="step-icon icon-service">💅</div>';
      formHtml += '<div class="step-content">';
      formHtml += '<div class="step-label">Выбрать услуги</div>';
      formHtml += '<select id="service" class="step-input" required>';
      formHtml += '<option value="">Выберите услугу</option>';
      services.forEach(function(service) {
        formHtml += '<option value="' + service.id + '">' + service.name + ' - ' + service.price + '₽ (' + service.duration + ' мин)</option>';
      });
      formHtml += '</select>';
      formHtml += '</div>';
      formHtml += '</div>';
      
      // Add master step
      formHtml += '<div class="step-item">';
      formHtml += '<div class="step-icon icon-master">✂️</div>';
      formHtml += '<div class="step-content">';
      formHtml += '<div class="step-label">Выбрать специалиста</div>';
      formHtml += '<select id="master" class="step-input" required>';
      formHtml += '<option value="">Выберите специалиста</option>';
      masters.forEach(function(master) {
        formHtml += '<option value="' + master.id + '">' + master.name + '</option>';
      });
      formHtml += '</select>';
      formHtml += '</div>';
      formHtml += '</div>';
      
      // Add datetime step
      formHtml += '<div class="step-item">';
      formHtml += '<div class="step-icon icon-datetime">📅</div>';
      formHtml += '<div class="step-content">';
      formHtml += '<div class="step-label">Дата и время</div>';
      formHtml += '<div class="datetime-container">';
      formHtml += '<input type="date" id="date" class="step-input" required>';
      formHtml += '<input type="time" id="time" class="step-input" required>';
      formHtml += '</div>';
      formHtml += '</div>';
      formHtml += '</div>';
      
      // Add customer info step
      formHtml += '<div class="step-item">';
      formHtml += '<div class="step-icon icon-customer">👤</div>';
      formHtml += '<div class="step-content">';
      formHtml += '<div class="step-label">Ваши данные</div>';
      formHtml += '<input type="text" id="customer-name" class="step-input" placeholder="Имя" required>';
      formHtml += '<input type="tel" id="customer-phone" class="step-input" placeholder="Телефон" required>';
      formHtml += '<input type="email" id="customer-email" class="step-input" placeholder="Email (необязательно)">';
      formHtml += '</div>';
      formHtml += '</div>';
      
      // Add works section if exists
      if (works.length > 0) {
        formHtml += '<div class="works-section">';
        formHtml += '<h3 class="works-title">Наши работы</h3>';
        formHtml += '<div class="works-grid">';
        works.forEach(function(work) {
          formHtml += '<div class="work-item">';
          if (work.type === 'video') {
            formHtml += '<video controls><source src="' + work.url + '" type="video/mp4"></video>';
          } else {
            formHtml += '<img src="' + work.url + '" alt="' + (work.description || 'Работа') + '">';
          }
          formHtml += '</div>';
        });
        formHtml += '</div>';
        formHtml += '</div>';
      }
      
      // Add submit button
      formHtml += '<div class="submit-section">';
      formHtml += '<button type="submit" class="btn-submit" onclick="handleBookingSubmit(event)">Записаться</button>';
      formHtml += '</div>';
      
      formHtml += '</div>';
      
      document.getElementById('booking-content').innerHTML = formHtml;
      
      // Set minimum date to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').min = today;
    }

    async function handleBookingSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.querySelector('.btn-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Создание записи...';
      
      const formData = {
        branchId: document.getElementById('branch')?.value || null,
        customerName: document.getElementById('customer-name').value,
        customerPhone: document.getElementById('customer-phone').value,
        customerEmail: document.getElementById('customer-email').value || null,
        serviceId: document.getElementById('service').value,
        staffId: document.getElementById('master').value,
        startsAt: combineDateTime()
      };
      
      try {
        const response = await fetch('/api/public/appointments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
        
        if (response.ok) {
          alert('Запись успешно создана!');
          // Optionally reset form or redirect
        } else {
          const error = await response.json();
          throw new Error(error.error || 'Ошибка при записи');
        }
      } catch (error) {
        console.error('Booking error:', error);
        alert('Ошибка: ' + error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Записаться';
      }
    }
    
    function combineDateTime() {
      const dateInput = document.getElementById('date').value;
      const timeInput = document.getElementById('time').value;
      
      if (!dateInput || !timeInput) return null;
      
      return dateInput + 'T' + timeInput + ':00';
    }
  </script>
</body>
</html>
