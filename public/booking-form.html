<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Онлайн-запись - Bloknot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" href="/favicon.png" type="image/png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffffff;
      color: #111;
      line-height: 1.4;
    }

    /* HEADER */
    .header {
      width: 100%;
      border-bottom: 1px solid #eee;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img {
      height: 44px;
      display: block;
    }

    /* MAIN CONTENT */
    .main-content {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .booking-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .booking-header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .booking-header p {
      font-size: 18px;
      color: #6b7280;
    }

    /* FORM STYLES */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .btn-submit {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #2563eb;
    }

    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .error {
      text-align: center;
      padding: 40px;
      color: #dc2626;
      font-size: 18px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
      font-size: 18px;
    }

    .success {
      text-align: center;
      padding: 40px;
      background: #f0fdf4;
      border: 2px solid #22c55e;
      border-radius: 8px;
    }

    .success h2 {
      color: #16a34a;
      margin-bottom: 16px;
    }

    .success p {
      color: #15803d;
      margin-bottom: 8px;
    }

    .business-info {
      background: #f8fafc;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    .business-name {
      font-size: 20px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .business-meta {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .main-content {
        margin: 24px auto;
        padding: 0 16px;
      }

      .booking-header h1 {
        font-size: 28px;
      }

      .booking-header p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <img src="/logo-wordmark.svg" alt="Bloknot">
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="booking-header">
      <h1>Онлайн-запись</h1>
      <p>Выберите услугу, мастера и удобное время</p>
    </div>

    <div id="business-info" class="business-info" style="display: none;">
      <div class="business-name" id="business-name">Загрузка...</div>
      <div class="business-meta" id="business-meta">Загрузка...</div>
    </div>

    <div id="booking-content">
      <div class="loading">Загрузка данных...</div>
    </div>
  </main>

  <script>
    // Get slug from URL - handle both /book-template/slug and /book-template/:slug formats
    const pathParts = window.location.pathname.split('/').filter(part => part);
    const slug = pathParts[pathParts.length - 1];
    
    console.log('Current path:', window.location.pathname);
    console.log('Path parts:', pathParts);
    console.log('Extracted slug:', slug);
    
    if (!slug || slug === 'book-template' || slug === 'book') {
      document.getElementById('booking-content').innerHTML = '<div class="error">Бизнес не найден. Неверная ссылка.</div>';
    } else {
      loadBookingData();
    }

    async function loadBookingData() {
      try {
        console.log('Loading booking data for slug:', slug);
        
        // Load business info
        const businessResponse = await fetch(`/api/public/business?slug=${slug}`);
        console.log('Business response status:', businessResponse.status);
        
        if (businessResponse.ok) {
          const business = await businessResponse.json();
          console.log('Business data:', business);
          document.getElementById('business-info').style.display = 'block';
          document.getElementById('business-name').textContent = business.name;
          document.getElementById('business-meta').textContent = business.address || 'Онлайн-запись доступна';
        } else {
          const errorText = await businessResponse.text();
          console.error('Business API error:', businessResponse.status, errorText);
        }

        // Load branches, services and masters
        console.log('Loading branches, services, masters...');
        const [branches, services, masters] = await Promise.all([
          fetch(`/api/public/branches?slug=${slug}`).then(r => {
            console.log('Branches response status:', r.status);
            return r.json();
          }),
          fetch(`/api/public/services?slug=${slug}`).then(r => {
            console.log('Services response status:', r.status);
            return r.json();
          }),
          fetch(`/api/public/masters?slug=${slug}`).then(r => {
            console.log('Masters response status:', r.status);
            return r.json();
          })
        ]);

        console.log('Loaded data:', { branches, services, masters });

        // Check if there's any data to show
        if (branches.length === 0 && services.length === 0 && masters.length === 0) {
          document.getElementById('booking-content').innerHTML = `
            <div class="error">
              <h3>Запись временно недоступна</h3>
              <p>Владелец бизнеса еще не добавил услуги, мастеров или филиалы.</p>
              <p>Попробуйте зайти позже.</p>
            </div>
          `;
          return;
        }

        if (Array.isArray(branches) && Array.isArray(services) && Array.isArray(masters)) {
          renderBookingForm(branches, services, masters);
        } else {
          throw new Error('Invalid data format');
        }
      } catch (error) {
        console.error('Error loading booking data:', error);
        document.getElementById('booking-content').innerHTML = '<div class="error">Не удалось загрузить форму записи. Ошибка: ' + error.message + '</div>';
      }
    }

    function renderBookingForm(branches, services, masters) {
      const hasBranches = branches && branches.length > 0;
      
      const formHtml = `
        <form id="booking-form">
          ${hasBranches ? `
          <div class="form-group">
            <label for="branch">Филиал</label>
            <select id="branch" required>
              <option value="">Выберите филиал</option>
              ${branches.map(branch => `
                <option value="${branch.id}">${branch.name} ${branch.address ? `- ${branch.address}` : ''}</option>
              `).join('')}
            </select>
          </div>
          ` : ''}
          
          <div class="form-group">
            <label for="customer-name">Ваше имя</label>
            <input type="text" id="customer-name" required placeholder="Как к вам обращаться?">
          </div>
          
          <div class="form-group">
            <label for="customer-phone">Телефон</label>
            <input type="tel" id="customer-phone" required placeholder="+7 (999) 123-45-67">
          </div>
          
          <div class="form-group">
            <label for="service">Услуга</label>
            <select id="service" required>
              <option value="">Выберите услугу</option>
              ${services.map(service => `
                <option value="${service.id}" data-duration="${service.duration}" data-price="${service.price}">
                  ${service.name} - ${service.price}₽ (${service.duration} мин)
                </option>
              `).join('')}
            </select>
          </div>
          
          <div class="form-group">
            <label for="master">Мастер</label>
            <select id="master" required>
              <option value="">Выберите мастера</option>
              ${masters.map(master => `
                <option value="${master.id}">${master.name}</option>
              `).join('')}
            </select>
          </div>
          
          <div class="form-group">
            <label for="datetime">Дата и время</label>
            <input type="datetime-local" id="datetime" required>
          </div>
          
          <div class="form-group">
            <label for="customer-email">Email (необязательно)</label>
            <input type="email" id="customer-email" placeholder="email@example.com">
          </div>
          
          <button type="submit" class="btn-submit">Записаться</button>
        </form>
      `;
      
      document.getElementById('booking-content').innerHTML = formHtml;
      
      // Add form submit handler
      document.getElementById('booking-form').addEventListener('submit', handleBookingSubmit);
      
      // Set minimum datetime to now
      const now = new Date();
      const localDateTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      document.getElementById('datetime').min = localDateTime;
    }

    async function handleBookingSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.querySelector('.btn-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Создание записи...';
      
      const formData = {
        branchId: document.getElementById('branch')?.value || null,
        customerName: document.getElementById('customer-name').value,
        customerPhone: document.getElementById('customer-phone').value,
        customerEmail: document.getElementById('customer-email').value || null,
        serviceId: document.getElementById('service').value,
        staffId: document.getElementById('master').value,
        startsAt: document.getElementById('datetime').value
      };

      try {
        const response = await fetch(`/api/public/appointments?slug=${slug}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          document.getElementById('booking-content').innerHTML = `
            <div class="success">
              <h2>✅ Запись успешно создана!</h2>
              <p>Мы свяжемся с вами для подтверждения записи.</p>
              <p><strong>${formData.customerName}</strong></p>
              <p>📱 ${formData.customerPhone}</p>
              <p>🗓️ ${new Date(formData.startsAt).toLocaleString('ru-RU')}</p>
            </div>
          `;
        } else {
          const error = await response.json();
          throw new Error(error.error || 'Ошибка при записи');
        }
      } catch (error) {
        console.error('Booking error:', error);
        alert(`Ошибка: ${error.message}`);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Записаться';
      }
    }
  </script>
</body>
</html>
