<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Онлайн запись v3.0 - Step by Step</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1f2937;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 600px; /* Ужее рабочее поле */
      margin: 0 auto;
      padding: 20px;
    }

    .booking-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      min-height: 600px;
    }

    .booking-header {
      background: white;
      color: #333;
      padding: 16px 24px;
      text-align: left;
      position: relative;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-button {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #6b7280;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .back-button:hover {
      background: #f3f4f6;
    }

    .business-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .business-logo-header {
      flex-shrink: 0;
    }

    #business-logo-header-container {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e5e7eb;
    }

    #business-logo-header {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .business-details {
      flex: 1;
    }

    .business-name {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: #1f2937;
    }

    .step-content {
      padding: 32px 24px;
    }

    .step-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .step-subtitle {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .options-grid {
      display: grid;
      gap: 12px;
    }

    .option-item {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-item:hover {
      border-color: #3b82f6;
      background: #f8fafc;
    }

    .option-item.selected {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .option-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .option-details {
      flex: 1;
    }

    .option-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .option-description {
      font-size: 14px;
      color: #6b7280;
    }

    .continue-button {
      width: 100%;
      padding: 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 24px;
    }

    .continue-button:hover {
      background: #2563eb;
    }

    .continue-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* Calendar styles */
    .calendar-container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e5e7eb;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-nav {
      display: flex;
      gap: 12px;
    }

    .calendar-nav button {
      background: none;
      border: 1px solid #e5e7eb;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .calendar-nav button:hover {
      background: #f3f4f6;
    }

    .calendar-month {
      font-size: 18px;
      font-weight: 600;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day-header {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      padding: 8px 0;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .calendar-day:hover {
      background: #f3f4f6;
    }

    .calendar-day.available {
      background: white;
      border: 1px solid #e5e7eb;
    }

    .calendar-day.available:hover {
      background: #eff6ff;
      border-color: #3b82f6;
    }

    .calendar-day.selected {
      background: #3b82f6;
      color: white;
    }

    .calendar-day.disabled {
      color: #d1d5db;
      cursor: not-allowed;
    }

    .calendar-day.today {
      background: #fef3c7;
      font-weight: 600;
    }

    /* Time slots */
    .time-slots-container {
      margin-top: 24px;
    }

    .time-period {
      margin-bottom: 24px;
    }

    .time-period-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
    }

    .time-slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }

    .time-slot {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .time-slot:hover {
      background: #f3f4f6;
    }

    .time-slot.available {
      background: white;
      border-color: #10b981;
      color: #059669;
    }

    .time-slot.available:hover {
      background: #ecfdf5;
    }

    .time-slot.selected {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }

    .time-slot.disabled {
      background: #f9fafb;
      color: #d1d5db;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 60px 32px;
      color: #6b7280;
      font-size: 18px;
    }

    .error {
      text-align: center;
      padding: 60px 32px;
      color: #ef4444;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .booking-header {
        padding: 12px 16px;
      }

      .step-content {
        padding: 24px 16px;
      }

      .business-name {
        font-size: 16px;
      }

      #business-logo-header-container {
        width: 32px;
        height: 32px;
      }

      .time-slots-grid {
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="booking-card">
      <div class="booking-header">
        <button class="back-button" onclick="goBack()" style="display: none;" id="backButton">
          ←
        </button>
        <div class="business-info">
          <div class="business-logo-header">
            <div id="business-logo-header-container">
              <img id="business-logo-header" src="" alt="Logo" style="display: none;">
              <div class="no-logo-header-text" style="display: none;">Нет логотипа</div>
            </div>
          </div>
          <div class="business-details">
            <h1 class="business-name" id="business-name">Загрузка...</h1>
          </div>
        </div>
      </div>
      
      <div id="step-content">
        <div class="loading">Загрузка данных...</div>
      </div>
    </div>
  </div>

  <script>
    console.log('🚀 Booking form v3.0 - Step by Step');
    
    // Prevent auto-scroll
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
    
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    // Get slug from URL
    const pathParts = window.location.pathname.split('/').filter(part => part);
    const slug = pathParts[pathParts.length - 1];
    
    console.log('Current path:', window.location.pathname);
    console.log('Extracted slug:', slug);
    
    if (!slug || slug === 'book-template' || slug === 'book') {
      document.getElementById('step-content').innerHTML = '<div class="error">Бизнес не найден. Неверная ссылка.</div>';
    } else {
      loadBookingData();
    }

    // Global state
    let bookingData = {
      business: null,
      branchId: null,
      serviceId: null,
      masterId: null,
      date: null,
      time: null,
      customerName: '',
      customerPhone: '',
      customerEmail: ''
    };

    let currentStep = 'branches';
    let history = [];

    // Load business data
    async function loadBookingData() {
      try {
        console.log('Loading booking data for slug:', slug);
        
        const businessResponse = await fetch('/api/public/business?slug=' + slug);
        console.log('Business response status:', businessResponse.status);
        
        if (businessResponse.ok) {
          const business = await businessResponse.json();
          console.log('Business data received:', business);
          
          bookingData.business = business;
          
          // Load company name and logo
          const businessNameElement = document.getElementById('business-name');
          if (business.name && businessNameElement) {
            businessNameElement.textContent = business.name;
          }
          
          const logoHeaderElement = document.getElementById('business-logo-header');
          const logoHeaderContainer = document.getElementById('business-logo-header-container');
          
          if (business.logo && logoHeaderElement && logoHeaderContainer) {
            logoHeaderElement.src = business.logo;
            logoHeaderElement.style.display = 'block';
          }
          
          // Load all data
          console.log('Loading branches, services, masters...');
          
          try {
            const [branches, services, masters] = await Promise.all([
              fetch('/api/public/branches?slug=' + slug).then(r => {
                console.log('Branches response status:', r.status);
                if (!r.ok) throw new Error('Branches API error: ' + r.status);
                return r.json();
              }),
              fetch('/api/public/services?slug=' + slug).then(r => {
                console.log('Services response status:', r.status);
                if (!r.ok) throw new Error('Services API error: ' + r.status);
                return r.json();
              }),
              fetch('/api/public/masters?slug=' + slug).then(r => {
                console.log('Masters response status:', r.status);
                if (!r.ok) throw new Error('Masters API error: ' + r.status);
                return r.json();
              })
            ]);

            console.log('Data loaded successfully:', {
              branches: branches.length,
              services: services.length,
              masters: masters.length
            });

            bookingData.branches = branches;
            bookingData.services = services;
            bookingData.masters = masters;

            // Start with first available step
            if (branches.length > 0) {
              showStep('branches');
            } else if (services.length > 0) {
              showStep('services');
            } else if (masters.length > 0) {
              showStep('masters');
            } else {
              document.getElementById('step-content').innerHTML = '<div class="error">Нет доступных услуг или специалистов</div>';
            }
          } catch (error) {
            console.error('Error loading additional data:', error);
            document.getElementById('step-content').innerHTML = '<div class="error">Ошибка загрузки данных: ' + error.message + '</div>';
          }
        } else {
          const errorText = await businessResponse.text();
          console.error('Business API error:', businessResponse.status, errorText);
          document.getElementById('step-content').innerHTML = '<div class="error">Ошибка загрузки бизнеса: ' + businessResponse.status + '</div>';
          return;
        }
      } catch (error) {
        console.error('Error loading booking data:', error);
        document.getElementById('step-content').innerHTML = '<div class="error">Ошибка загрузки данных. Пожалуйста, попробуйте позже.</div>';
      }
    }

    // Show specific step
    function showStep(step) {
      currentStep = step;
      history.push(step);
      
      // Show/hide back button
      const backButton = document.getElementById('backButton');
      backButton.style.display = history.length > 1 ? 'block' : 'none';
      
      const stepContent = document.getElementById('step-content');
      
      switch(step) {
        case 'branches':
          showBranchesStep(stepContent);
          break;
        case 'services':
          showServicesStep(stepContent);
          break;
        case 'masters':
          showMastersStep(stepContent);
          break;
        case 'datetime':
          showDateTimeStep(stepContent);
          break;
        case 'customer':
          showCustomerStep(stepContent);
          break;
        case 'confirmation':
          showConfirmationStep(stepContent);
          break;
      }
    }

    // Branches step
    function showBranchesStep(container) {
      const branches = bookingData.branches;
      
      let html = `
        <div class="step-content">
          <h2 class="step-title">Выберите филиал</h2>
          <p class="step-subtitle">Где вам удобно посетить нас?</p>
          
          <div class="options-grid">
      `;
      
      branches.forEach(branch => {
        html += `
          <div class="option-item" onclick="selectBranch(${branch.id})">
            <div class="option-icon" style="background: #fef3c7;">📍</div>
            <div class="option-details">
              <div class="option-title">${branch.name}</div>
              <div class="option-description">${branch.address || ''}</div>
            </div>
          </div>
        `;
      });
      
      html += `
          </div>
        </div>
      `;
      
      container.innerHTML = html;
    }

    // Services step
    function showServicesStep(container) {
      const services = bookingData.services;
      
      let html = `
        <div class="step-content">
          <h2 class="step-title">Выберите услугу</h2>
          <p class="step-subtitle">Что мы можем для вас сделать?</p>
          
          <div class="options-grid">
      `;
      
      services.forEach(service => {
        html += `
          <div class="option-item" onclick="selectService(${service.id})">
            <div class="option-icon" style="background: #dbeafe;">💅</div>
            <div class="option-details">
              <div class="option-title">${service.name}</div>
              <div class="option-description">${service.price}₽ • ${service.duration} мин</div>
            </div>
          </div>
        `;
      });
      
      html += `
          </div>
        </div>
      `;
      
      container.innerHTML = html;
    }

    // Masters step
    function showMastersStep(container) {
      const masters = bookingData.masters;
      
      let html = `
        <div class="step-content">
          <h2 class="step-title">Выберите специалиста</h2>
          <p class="step-subtitle">Кто будет выполнять услугу?</p>
          
          <div class="options-grid">
      `;
      
      masters.forEach(master => {
        html += `
          <div class="option-item" onclick="selectMaster(${master.id})">
            <div class="option-icon" style="background: #fce7f3;">✂️</div>
            <div class="option-details">
              <div class="option-title">${master.name}</div>
              <div class="option-description">${master.specialty || 'Специалист'}</div>
            </div>
          </div>
        `;
      });
      
      html += `
          </div>
        </div>
      `;
      
      container.innerHTML = html;
    }

    // DateTime step
    function showDateTimeStep(container) {
      const today = new Date();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();
      
      let html = `
        <div class="step-content">
          <h2 class="step-title">Выберите дату и время</h2>
          <p class="step-subtitle">Когда вам удобно?</p>
          
          <div class="calendar-container">
            <div class="calendar-header">
              <div class="calendar-month">${getMonthName(currentMonth)} ${currentYear}</div>
              <div class="calendar-nav">
                <button onclick="changeMonth(-1)">←</button>
                <button onclick="changeMonth(1)">→</button>
              </div>
            </div>
            <div class="calendar-grid">
              ${getCalendarDays(currentMonth, currentYear)}
            </div>
          </div>
          
          <div class="time-slots-container" id="timeSlots" style="display: none;">
            <div class="time-period">
              <div class="time-period-title">Утро</div>
              <div class="time-slots-grid">
                ${getTimeSlots('morning')}
              </div>
            </div>
            <div class="time-period">
              <div class="time-period-title">День</div>
              <div class="time-slots-grid">
                ${getTimeSlots('afternoon')}
              </div>
            </div>
            <div class="time-period">
              <div class="time-period-title">Вечер</div>
              <div class="time-slots-grid">
                ${getTimeSlots('evening')}
              </div>
            </div>
          </div>
        </div>
      `;
      
      container.innerHTML = html;
    }

    // Customer step
    function showCustomerStep(container) {
      let html = `
        <div class="step-content">
          <h2 class="step-title">Ваши данные</h2>
          <p class="step-subtitle">Как с вами связаться?</p>
          
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <input type="text" class="option-item" placeholder="Имя" id="customerName" style="cursor: text;">
            <input type="tel" class="option-item" placeholder="Телефон" id="customerPhone" style="cursor: text;">
            <input type="email" class="option-item" placeholder="Email (необязательно)" id="customerEmail" style="cursor: text;">
          </div>
          
          <button class="continue-button" onclick="submitBooking()">Записаться</button>
        </div>
      `;
      
      container.innerHTML = html;
    }

    // Selection handlers
    function selectBranch(branchId) {
      bookingData.branchId = branchId;
      autoNavigateToNext();
    }

    function selectService(serviceId) {
      bookingData.serviceId = serviceId;
      autoNavigateToNext();
    }

    function selectMaster(masterId) {
      bookingData.masterId = masterId;
      autoNavigateToNext();
    }

    function selectDate(date) {
      bookingData.date = date;
      
      // Show time slots
      document.getElementById('timeSlots').style.display = 'block';
      
      // Highlight selected date
      document.querySelectorAll('.calendar-day').forEach(day => {
        day.classList.remove('selected');
      });
      event.target.classList.add('selected');
    }

    function selectTime(time) {
      bookingData.time = time;
      
      // Highlight selected time
      document.querySelectorAll('.time-slot').forEach(slot => {
        slot.classList.remove('selected');
      });
      event.target.classList.add('selected');
      
      // Auto navigate to customer info
      setTimeout(() => showStep('customer'), 300);
    }

    // Auto navigate to next step
    function autoNavigateToNext() {
      setTimeout(() => {
        const nextStep = getNextStep();
        if (nextStep) {
          showStep(nextStep);
        }
      }, 300);
    }

    // Get next available step
    function getNextStep() {
      const steps = ['branches', 'services', 'masters', 'datetime', 'customer'];
      const currentIndex = steps.indexOf(currentStep);
      
      for (let i = currentIndex + 1; i < steps.length; i++) {
        const step = steps[i];
        
        if (step === 'branches' && bookingData.branches.length === 0) continue;
        if (step === 'services' && bookingData.services.length === 0) continue;
        if (step === 'masters' && bookingData.masters.length === 0) continue;
        
        return step;
      }
      
      return null;
    }

    // Navigation
    function goBack() {
      if (history.length > 1) {
        history.pop(); // Remove current step
        const previousStep = history.pop(); // Get previous step
        showStep(previousStep);
      }
    }

    // Calendar helpers
    function getMonthName(month) {
      const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                     'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
      return months[month];
    }

    function getCalendarDays(month, year) {
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      
      let html = '';
      
      // Day headers
      const dayHeaders = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      dayHeaders.forEach(day => {
        html += `<div class="calendar-day-header">${day}</div>`;
      });
      
      // Empty cells for first week
      for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
        html += '<div class="calendar-day disabled"></div>';
      }
      
      // Days of month
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const isToday = date.toDateString() === today.toDateString();
        const isPast = date < today && !isToday;
        const isAvailable = !isPast; // Simplified - should check actual availability
        
        let classes = 'calendar-day';
        if (isToday) classes += ' today';
        if (isPast) classes += ' disabled';
        if (isAvailable && !isPast) classes += ' available';
        
        html += `<div class="${classes}" onclick="selectDate('${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}')">${day}</div>`;
      }
      
      return html;
    }

    function getTimeSlots(period) {
      const slots = {
        morning: ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00', '12:30'],
        afternoon: ['13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30'],
        evening: ['18:00', '18:30', '19:00', '19:30', '20:00', '20:30']
      };
      
      let html = '';
      slots[period].forEach(time => {
        html += `<div class="time-slot available" onclick="selectTime('${time}')">${time}</div>`;
      });
      
      return html;
    }

    function changeMonth(direction) {
      // Implementation for month navigation
      console.log('Change month:', direction);
    }

    // Submit booking
    async function submitBooking() {
      const customerName = document.getElementById('customerName').value;
      const customerPhone = document.getElementById('customerPhone').value;
      const customerEmail = document.getElementById('customerEmail').value;
      
      if (!customerName || !customerPhone) {
        alert('Пожалуйста, заполните имя и телефон');
        return;
      }
      
      bookingData.customerName = customerName;
      bookingData.customerPhone = customerPhone;
      bookingData.customerEmail = customerEmail;
      
      try {
        const response = await fetch('/api/public/appointments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            branchId: bookingData.branchId,
            serviceId: bookingData.serviceId,
            masterId: bookingData.masterId,
            customerName: bookingData.customerName,
            customerPhone: bookingData.customerPhone,
            customerEmail: bookingData.customerEmail,
            startsAt: bookingData.date + 'T' + bookingData.time + ':00'
          })
        });
        
        if (response.ok) {
          alert('Запись успешно создана!');
          // Redirect or show confirmation
        } else {
          const error = await response.json();
          throw new Error(error.error || 'Ошибка при записи');
        }
      } catch (error) {
        console.error('Booking error:', error);
        alert('Ошибка: ' + error.message);
      }
    }
  </script>
</body>
</html>
