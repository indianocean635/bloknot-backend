<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Супер Админ — Bloknot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin-page">
  <script>
    // Check if user is authenticated as super admin
    const userEmail = localStorage.getItem('bloknot_admin_email');
    const isLoggedIn = localStorage.getItem('bloknot_admin_logged_in') === '1';
    
    // Allow any logged in admin
    if (!isLoggedIn) {
      // Redirect to login page
      window.location.href = '/admin-login.html';
    }
  </script>
  <style>
    body.admin-page {
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .admin-sidebar {
      display: none;
    }
    .container.admin-container {
      max-width: none !important;
      width: 100% !important;
      padding: 20px !important;
      margin: 0 !important;
    }
    .card {
      width: 100% !important;
    }
  </style>
  
  <main class="container admin-container">
    <h1 class="page-title">Супер Админ</h1>
    <p class="page-subtitle">Статистика и пользователи</p>

    <div style="text-align: center; margin-top: 20px;">
      <div id="adminImageContainer">
        <img 
          id="adminImage" 
          src="/suitcase-money.jpg" 
          alt="Admin Image"
          style="
            max-width: 400px; 
            width: 100%;
            height: auto;
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.2s;
          "
          onmouseover="this.style.transform='scale(1.02)'"
          onmouseout="this.style.transform='scale(1)'"
          onclick="document.getElementById('imageUpload').click()"
          onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjQwMCIgdmlld0JveD0iMCAwIDYwMCA0MDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSI2MDAiIGhlaWdodD0iNDAwIiBmaWxsPSIjRjNGNEY2Ii8+Cjx0ZXh0IHg9IjMwMCIgeT0iMjAwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjNjY2IiBmb250LXNpemU9IjI0Ij7Ql9C10L3QtdGA0L7QstC+INC00L7QsdCw0YDQvtC80LXQvdC40Lg8L3RleHQ+Cjwvc3ZnPg=='"
        />
      </div>
      
      <input 
        type="file" 
        id="imageUpload" 
        accept="image/*" 
        style="display: none;"
        onchange="handleImageUpload(event)"
      />
      
      <div id="uploadStatus" style="margin-top: 10px; font-size: 14px; color: #666;"></div>
    </div>

    <div class="actions" style="margin-top:10px">
      <a class="btn secondary" href="/api/admin/return" style="padding:8px 10px; border-radius:10px">Вернуться в админ</a>
    </div>

    <div class="row three" style="margin-top:14px">
      <div class="card">
        <div class="item-title">Всего пользователей</div>
        <div id="statTotal" style="font-size:28px; font-weight:1000; margin-top:6px">—</div>
      </div>
      <div class="card">
        <div class="item-title">Платящих</div>
        <div id="statPaying" style="font-size:28px; font-weight:1000; margin-top:6px">—</div>
      </div>
      <div class="card">
        <div class="item-title">Сумма оплат</div>
        <div id="statPaid" style="font-size:28px; font-weight:1000; margin-top:6px">—</div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="actions" style="justify-content:space-between">
        <div>
          <div class="item-title">Пользователи</div>
          <div class="item-meta">Email, дата регистрации, статус оплаты, сумма оплат, следующее списание</div>
        </div>
        <div class="actions">
          <button class="btn secondary" id="refreshBtn" type="button">Обновить</button>
        </div>
      </div>

      <div class="field" style="margin-top:12px">
        <label for="q">Поиск по email</label>
        <input id="q" placeholder="например: example@mail.ru" />
      </div>

      <div class="notice" id="notice" style="display:none; margin-top:12px"></div>

      <div style="overflow:auto; margin-top:12px">
        <table style="width:100%; border-collapse:separate; border-spacing:0; font-size:13px">
          <thead>
            <tr>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:25%">Email</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:12%">Name</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:12%">Phone</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:12%">Password</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:10%">Registration</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:6%">Paying</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:8%">Paid (RUB)</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:8%">Next billing</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:8%">Staff</th>
              <th style="text-align:left; padding:8px 8px; border-bottom:1px solid var(--border); font-size:12px; width:11%">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const notice = document.getElementById('notice');
    const tbody = document.getElementById('tbody');
    const q = document.getElementById('q');

    function escHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function api(url, options) {
      const adminEmail = localStorage.getItem('bloknot_admin_email');
      const isLoggedIn = localStorage.getItem('bloknot_admin_logged_in') === '1';
      
      const headers = {
        'Content-Type': 'application/json',
        ...(adminEmail && { 'x-admin-email': adminEmail }),
        ...(isLoggedIn && { 'x-admin-logged-in': 'true' }),
        ...(options?.headers || {})
      };
      
      const r = await fetch(url, Object.assign({ 
        credentials: 'include',
        headers: headers
      }, options || {}));
      
      const ct = String(r.headers.get('content-type') || '');
      if (!r.ok) {
        let text = "";
        try {
          text = await r.text();
        } catch (e) {}
        throw new Error(text || ("HTTP " + r.status));
      }
      if (ct.includes('application/json')) return r.json();
      return r.text();
    }

    function showNotice(text) {
      if (!text) {
        notice.style.display = 'none';
        notice.textContent = '';
        return;
      }
      notice.style.display = 'block';
      notice.textContent = text;
    }

    function fmtDate(d) {
      try {
        if (!d) return '';
        const dt = new Date(d);
        return dt.toLocaleString('ru-RU', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      } catch (e) {
        return '';
      }
    }

    function esc(s){ return escHtml(String(s||'')); }

    async function loadStats() {
      const s = await api('/api/admin/stats');
      document.getElementById('statTotal').textContent = String(s.totalUsers ?? '—');
      document.getElementById('statPaying').textContent = String(s.payingUsers ?? '—');
      document.getElementById('statPaid').textContent = String(s.totalPaid ?? '—');
    }

    async function loadUsers() {
      const users = await api('/api/admin/users');
      const query = String(q.value || '').trim().toLowerCase();
      const filtered = query ? users.filter(u => String(u.email||'').toLowerCase().includes(query)) : users;

      tbody.innerHTML = filtered.map((u) => {
        const next = u.nextBillingAt ? fmtDate(u.nextBillingAt) : '';
        return `
          <tr>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <a href="#" data-action="impersonate" data-id="${esc(u.id)}" style="font-weight:700; font-size:12px">${esc(u.email)}</a>
            </td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">${esc(u.name || '-')}</td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">${esc(u.phone || '-')}</td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <div style="display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 11px; color: #666; font-family: monospace;">
                  ${u.password ? '***' : 'No password'}
                </span>
                ${u.password ? `
                  <button class="btn secondary" onclick="copyPassword('${esc(u.id)}', '${esc(u.email)}')" style="padding: 3px 6px; font-size: 10px;">
                    Copy
                  </button>
                  <button class="btn secondary" onclick="resetPassword('${esc(u.id)}', '${esc(u.email)}')" style="padding: 3px 6px; font-size: 10px;">
                    Reset
                  </button>
                ` : ''}
              </div>
            </td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">${fmtDate(u.createdAt)}</td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <label style="display:inline-flex; align-items:center; gap:6px; user-select:none; font-size:12px">
                <input type="checkbox" data-id="${esc(u.id)}" data-field="isPaying" ${u.isPaying ? 'checked' : ''} />
                <span style="font-size:12px">${u.isPaying ? 'Yes' : 'No'}</span>
              </label>
            </td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <input data-id="${esc(u.id)}" data-field="totalPaid" value="${Number(u.totalPaid||0)}" style="width:100px; padding:4px 6px; border-radius:8px; border:1px solid var(--border); font-size:12px" />
            </td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <input data-id="${esc(u.id)}" data-field="nextBillingAt" value="${u.nextBillingAt ? new Date(u.nextBillingAt).toISOString().slice(0,10) : ''}" placeholder="YYYY-MM-DD" style="width:120px; padding:4px 6px; border-radius:8px; border:1px solid var(--border); font-size:12px" />
            </td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <div style="font-size:11px; color:#666">
                ${u.staffUsers ? u.staffUsers.length : 0} users
                ${u.staffUsers && u.staffUsers.length > 0 ? 
                  `<br>${u.staffUsers.map(s => `${s.email}${s.phone ? ` (${s.phone})` : ''}`).join('<br>')}` 
                  : ''}
              </div>
            </td>
            <td style="padding:6px 8px; border-bottom:1px solid rgba(229,231,235,0.7); font-size:12px">
              <button class="btn secondary" data-action="save" data-id="${esc(u.id)}" type="button" style="padding:4px 8px; font-size:11px">Save</button>
              <button class="btn danger" data-action="delete" data-id="${esc(u.id)}" type="button" style="margin-left:6px; padding:4px 8px; font-size:11px">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function saveUser(id) {
      const isPayingEl = document.querySelector(`input[data-id="${CSS.escape(id)}"][data-field="isPaying"]`);
      const totalPaidEl = document.querySelector(`input[data-id="${CSS.escape(id)}"][data-field="totalPaid"]`);
      const nextBillingAtEl = document.querySelector(`input[data-id="${CSS.escape(id)}"][data-field="nextBillingAt"]`);

      const payload = {
        isPaying: !!(isPayingEl && isPayingEl.checked),
        totalPaid: Number(totalPaidEl && totalPaidEl.value ? totalPaidEl.value : 0) || 0,
        nextBillingAt: nextBillingAtEl && nextBillingAtEl.value ? nextBillingAtEl.value : "",
      };

      await api(`/api/admin/users/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    }

    async function deleteUser(id) {
      await api(`/api/admin/users/${id}`, { method: 'DELETE' });
    }

    // Copy password to clipboard
    async function copyPassword(userId, userEmail) {
      try {
        const user = await api(`/api/admin/users/${userId}`);
        if (user.password) {
          await navigator.clipboard.writeText(user.password);
          showNotice(`Password copied for ${userEmail}`);
        } else {
          showNotice('No password set for this user');
        }
      } catch (error) {
        showNotice('Failed to copy password: ' + error.message);
      }
    }

    // Reset user password
    async function resetPassword(userId, userEmail) {
      const newPassword = prompt(`Enter new password for ${userEmail}:`);
      if (!newPassword) return;
      
      try {
        await api(`/api/admin/users/${userId}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: newPassword })
        });
        showNotice(`Password reset for ${userEmail}`);
        await loadUsers(); // Refresh the table
      } catch (error) {
        showNotice('Failed to reset password: ' + error.message);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      showNotice('');
      try {
        await Promise.all([loadStats(), loadUsers()]);
      } catch (e) {
        showNotice('Ошибка: ' + (e && e.message ? e.message : '')); 
      }
    });

    q.addEventListener('input', () => {
      loadUsers().catch(() => {});
    });

    document.addEventListener('click', async (e) => {
      const saveBtn = e.target && e.target.closest && e.target.closest('button[data-action="save"]');
      const delBtn = e.target && e.target.closest && e.target.closest('button[data-action="delete"]');
      const impLink = e.target && e.target.closest && e.target.closest('a[data-action="impersonate"]');

      if (impLink) {
        e.preventDefault();
        const id = impLink.getAttribute('data-id');
        window.location.href = `/api/admin/impersonate/${encodeURIComponent(id)}`;
        return;
      }

      if (saveBtn) {
        const id = saveBtn.getAttribute('data-id');
        showNotice('');
        saveBtn.disabled = true;
        try {
          await saveUser(id);
          await Promise.all([loadStats(), loadUsers()]);
        } catch (err) {
          showNotice('Не удалось сохранить: ' + (err && err.message ? err.message : ''));
        } finally {
          saveBtn.disabled = false;
        }
        return;
      }

      if (delBtn) {
        const id = delBtn.getAttribute('data-id');
        const ok = window.confirm('Удалить пользователя? Это действие необратимо.');
        if (!ok) return;
        showNotice('');
        delBtn.disabled = true;
        try {
          await deleteUser(id);
          await Promise.all([loadStats(), loadUsers()]);
        } catch (err) {
          showNotice('Не удалось удалить: ' + (err && err.message ? err.message : ''));
        } finally {
          delBtn.disabled = false;
        }
        return;
      }
    });

    // Image upload functions
    async function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      // Validate file type
      if (!file.type.startsWith('image/')) {
        showUploadStatus('Please select an image file', 'error');
        return;
      }
      
      // Validate file size (max 5MB)
      if (file.size > 5 * 1024 * 1024) {
        showUploadStatus('File size must be less than 5MB', 'error');
        return;
      }
      
      showUploadStatus('Uploading...', 'loading');
      
      const formData = new FormData();
      formData.append('image', file);
      
      try {
        const response = await fetch('/api/admin/upload-image', {
          method: 'POST',
          body: formData,
          headers: {
            'x-admin-email': localStorage.getItem('bloknot_admin_email'),
            'x-admin-logged-in': '1'
          }
        });
        
        if (!response.ok) {
          throw new Error('Upload failed');
        }
        
        const result = await response.json();
        
        if (result.success) {
          // Get the actual filename with extension
          const imageUrl = '/admin-custom-image.' + file.name.split('.').pop();
          
          // Update the image src with timestamp to force reload
          document.getElementById('adminImage').src = imageUrl + '?t=' + Date.now();
          showUploadStatus('Image uploaded successfully!', 'success');
          
          // Store in localStorage
          localStorage.setItem('admin_custom_image', imageUrl);
        } else {
          throw new Error(result.error || 'Upload failed');
        }
      } catch (error) {
        showUploadStatus('Upload failed: ' + error.message, 'error');
      }
      
      // Reset file input
      event.target.value = '';
    }
    
    function resetImage() {
      if (confirm('Reset to default image?')) {
        // Reset to default
        document.getElementById('adminImage').src = '/suitcase-money.jpg';
        document.getElementById('resetImageBtn').style.display = 'none';
        showUploadStatus('Image reset to default', 'success');
        
        // Remove from localStorage
        localStorage.removeItem('admin_custom_image');
        
        // Also delete from server
        fetch('/api/admin/reset-image', {
          method: 'DELETE',
          headers: {
            'x-admin-email': localStorage.getItem('bloknot_admin_email'),
            'x-admin-logged-in': '1'
          }
        }).catch(() => {}); // Ignore errors
      }
    }
    
    function showUploadStatus(message, type) {
      const statusDiv = document.getElementById('uploadStatus');
      statusDiv.textContent = message;
      statusDiv.style.color = type === 'error' ? '#e74c3c' : type === 'success' ? '#27ae60' : '#666';
      
      // Clear message after 3 seconds
      if (type !== 'loading') {
        setTimeout(() => {
          statusDiv.textContent = '';
        }, 3000);
      }
    }
    
    // Load custom image on page load
    function loadCustomImage() {
      const customImage = localStorage.getItem('admin_custom_image');
      if (customImage) {
        document.getElementById('adminImage').src = customImage + '?t=' + Date.now();
      }
    }

    (async function init() {
      try {
        // Load custom image if exists
        loadCustomImage();
        
        // Load admin data
        await Promise.all([loadStats(), loadUsers()]);
      } catch (e) {
        showNotice('Error: ' + (e && e.message ? e.message : ''));
      }
    })();
  </script>
</body>
</html>
