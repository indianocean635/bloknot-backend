<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Super Admin — Bloknot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <script>
    // Check if user is authenticated as super admin
    const userEmail = localStorage.getItem('bloknot_admin_email');
    const isLoggedIn = localStorage.getItem('bloknot_admin_logged_in') === '1';
    
    // Only allow apeskov635@gmail.com
    if (!isLoggedIn || userEmail !== 'apeskov635@gmail.com') {
      // Redirect to login page
      window.location.href = '/admin-login.html';
    }
  </script>
  <div class="admin-sidebar">
    <img src="/admin-icon.png" alt="Admin Icon" class="admin-icon">
  </div>
  
  <main class="container">
    <h1 class="page-title">Super Admin</h1>
    <p class="page-subtitle">Statistica i pol'zovateli</p>

    <div class="actions" style="margin-top:10px">
      <a class="btn secondary" href="/api/admin/return" style="padding:8px 10px; border-radius:10px">Вернуться в админ</a>
    </div>

    <div class="row three" style="margin-top:14px">
      <div class="card">
        <div class="item-title">Всего пользователей</div>
        <div id="statTotal" style="font-size:28px; font-weight:1000; margin-top:6px">—</div>
      </div>
      <div class="card">
        <div class="item-title">Платящих</div>
        <div id="statPaying" style="font-size:28px; font-weight:1000; margin-top:6px">—</div>
      </div>
      <div class="card">
        <div class="item-title">Сумма оплат</div>
        <div id="statPaid" style="font-size:28px; font-weight:1000; margin-top:6px">—</div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="actions" style="justify-content:space-between">
        <div>
          <div class="item-title">Пользователи</div>
          <div class="item-meta">Email, дата регистрации, статус оплаты, сумма оплат, следующее списание</div>
        </div>
        <div class="actions">
          <button class="btn secondary" id="refreshBtn" type="button">Обновить</button>
        </div>
      </div>

      <div class="field" style="margin-top:12px">
        <label for="q">Поиск по email</label>
        <input id="q" placeholder="например: example@mail.ru" />
      </div>

      <div class="notice" id="notice" style="display:none; margin-top:12px"></div>

      <div style="overflow:auto; margin-top:12px">
        <table style="width:100%; border-collapse:separate; border-spacing:0">
          <thead>
            <tr>
              <th style="text-align:left; padding:10px 10px; border-bottom:1px solid var(--border)">Email</th>
              <th style="text-align:left; padding:10px 10px; border-bottom:1px solid var(--border)">Регистрация</th>
              <th style="text-align:left; padding:10px 10px; border-bottom:1px solid var(--border)">Платит</th>
              <th style="text-align:left; padding:10px 10px; border-bottom:1px solid var(--border)">Оплачено (₽)</th>
              <th style="text-align:left; padding:10px 10px; border-bottom:1px solid var(--border)">След. списание</th>
              <th style="text-align:left; padding:10px 10px; border-bottom:1px solid var(--border)">Действия</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const notice = document.getElementById('notice');
    const tbody = document.getElementById('tbody');
    const q = document.getElementById('q');

    function escHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function api(url, options) {
      const r = await fetch(url, Object.assign({ credentials: 'include' }, options || {}));
      const ct = String(r.headers.get('content-type') || '');
      if (!r.ok) {
        let msg = `HTTP ${r.status}`;
        if (ct.includes('application/json')) {
          try {
            const data = await r.json();
            if (data && data.error) msg = data.error;
          } catch (e) {}
        } else {
          try {
            const t = await r.text();
            if (t) msg = t;
          } catch (e) {}
        }
        throw new Error(msg);
      }
      if (ct.includes('application/json')) return r.json();
      return r.text();
    }

    function showNotice(text) {
      if (!text) {
        notice.style.display = 'none';
        notice.textContent = '';
        return;
      }
      notice.style.display = 'block';
      notice.textContent = text;
    }

    function fmtDate(d) {
      try {
        if (!d) return '';
        const dt = new Date(d);
        return dt.toLocaleString('ru-RU', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      } catch (e) {
        return '';
      }
    }

    function esc(s){ return escHtml(String(s||'')); }

    async function loadStats() {
      const s = await api('/api/admin/stats');
      document.getElementById('statTotal').textContent = String(s.totalUsers ?? '—');
      document.getElementById('statPaying').textContent = String(s.payingUsers ?? '—');
      document.getElementById('statPaid').textContent = String(s.totalPaid ?? '—');
    }

    async function loadUsers() {
      const users = await api('/api/admin/users');
      const query = String(q.value || '').trim().toLowerCase();
      const filtered = query ? users.filter(u => String(u.email||'').toLowerCase().includes(query)) : users;

      tbody.innerHTML = filtered.map((u) => {
        const next = u.nextBillingAt ? fmtDate(u.nextBillingAt) : '';
        return `
          <tr>
            <td style="padding:10px 10px; border-bottom:1px solid rgba(229,231,235,0.7)">
              <a href="#" data-action="impersonate" data-id="${esc(u.id)}" style="font-weight:800">${esc(u.email)}</a>
            </td>
            <td style="padding:10px 10px; border-bottom:1px solid rgba(229,231,235,0.7)">${fmtDate(u.createdAt)}</td>
            <td style="padding:10px 10px; border-bottom:1px solid rgba(229,231,235,0.7)">
              <label style="display:inline-flex; align-items:center; gap:8px; user-select:none">
                <input type="checkbox" data-id="${esc(u.id)}" data-field="isPaying" ${u.isPaying ? 'checked' : ''} />
                <span>${u.isPaying ? 'Да' : 'Нет'}</span>
              </label>
            </td>
            <td style="padding:10px 10px; border-bottom:1px solid rgba(229,231,235,0.7)">
              <input data-id="${esc(u.id)}" data-field="totalPaid" value="${Number(u.totalPaid||0)}" style="width:120px; padding:8px 10px; border-radius:12px; border:1px solid var(--border)" />
            </td>
            <td style="padding:10px 10px; border-bottom:1px solid rgba(229,231,235,0.7)">
              <input data-id="${esc(u.id)}" data-field="nextBillingAt" value="${u.nextBillingAt ? new Date(u.nextBillingAt).toISOString().slice(0,10) : ''}" placeholder="YYYY-MM-DD" style="width:140px; padding:8px 10px; border-radius:12px; border:1px solid var(--border)" />
            </td>
            <td style="padding:10px 10px; border-bottom:1px solid rgba(229,231,235,0.7)">
              <button class="btn secondary" data-action="save" data-id="${esc(u.id)}" type="button">Сохранить</button>
              <button class="btn danger" data-action="delete" data-id="${esc(u.id)}" type="button" style="margin-left:8px">Удалить</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function saveUser(id) {
      const isPayingEl = document.querySelector(`input[data-id="${CSS.escape(id)}"][data-field="isPaying"]`);
      const totalPaidEl = document.querySelector(`input[data-id="${CSS.escape(id)}"][data-field="totalPaid"]`);
      const nextBillingAtEl = document.querySelector(`input[data-id="${CSS.escape(id)}"][data-field="nextBillingAt"]`);

      const payload = {
        isPaying: !!(isPayingEl && isPayingEl.checked),
        totalPaid: Number(totalPaidEl && totalPaidEl.value ? totalPaidEl.value : 0) || 0,
        nextBillingAt: nextBillingAtEl && nextBillingAtEl.value ? nextBillingAtEl.value : "",
      };

      await api(`/api/admin/users/${encodeURIComponent(id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    }

    async function deleteUser(id) {
      await api(`/api/admin/users/${encodeURIComponent(id)}`, { method: 'DELETE' });
    }

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      showNotice('');
      try {
        await Promise.all([loadStats(), loadUsers()]);
      } catch (e) {
        showNotice('Ошибка: ' + (e && e.message ? e.message : '')); 
      }
    });

    q.addEventListener('input', () => {
      loadUsers().catch(() => {});
    });

    document.addEventListener('click', async (e) => {
      const saveBtn = e.target && e.target.closest && e.target.closest('button[data-action="save"]');
      const delBtn = e.target && e.target.closest && e.target.closest('button[data-action="delete"]');
      const impLink = e.target && e.target.closest && e.target.closest('a[data-action="impersonate"]');

      if (impLink) {
        e.preventDefault();
        const id = impLink.getAttribute('data-id');
        window.location.href = `/api/admin/impersonate/${encodeURIComponent(id)}`;
        return;
      }

      if (saveBtn) {
        const id = saveBtn.getAttribute('data-id');
        showNotice('');
        saveBtn.disabled = true;
        try {
          await saveUser(id);
          await Promise.all([loadStats(), loadUsers()]);
        } catch (err) {
          showNotice('Не удалось сохранить: ' + (err && err.message ? err.message : ''));
        } finally {
          saveBtn.disabled = false;
        }
        return;
      }

      if (delBtn) {
        const id = delBtn.getAttribute('data-id');
        const ok = window.confirm('Удалить пользователя? Это действие необратимо.');
        if (!ok) return;
        showNotice('');
        delBtn.disabled = true;
        try {
          await deleteUser(id);
          await Promise.all([loadStats(), loadUsers()]);
        } catch (err) {
          showNotice('Не удалось удалить: ' + (err && err.message ? err.message : ''));
        } finally {
          delBtn.disabled = false;
        }
        return;
      }
    });

    (async function init() {
      try {
        await Promise.all([loadStats(), loadUsers()]);
      } catch (e) {
        showNotice('Ошибка: ' + (e && e.message ? e.message : ''));
      }
    })();
  </script>
</body>
</html>
