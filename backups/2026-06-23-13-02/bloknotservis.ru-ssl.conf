# Nginx конфиг для bloknotservis.ru с HTTPS
# Путь: /etc/nginx/sites-available/bloknotservis.ru

# HTTP блок - редирект на HTTPS
server {
    listen 80;
    server_name bloknotservis.ru www.bloknotservis.ru;

    # Редирект на HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS блок - основной
server {
    listen 443 ssl http2;
    server_name bloknotservis.ru www.bloknotservis.ru;

    # SSL сертификаты (будут добавлены certbot)
    # ssl_certificate /etc/letsencrypt/live/bloknotservis.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bloknotservis.ru/privkey.pem;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # =========================
    # 🔥 API (САМОЕ ВАЖНОЕ)
    # =========================
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # 🌐 FRONT (СТАТИКА)
    # =========================
    location / {
        root /var/www/html;
        index index.html;

        try_files $uri $uri/ /index.html;
    }
}
