server {
    server_name bloknotservis.ru www.bloknotservis.ru;

    # API proxy
    location /api/ {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Auth proxy
    location /auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files с обновленным CSP
    location / {
        root /var/www/bloknot-backend/public;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Обновленный Content Security Policy с vkvideo.ru
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://widget.cloudpayments.ru https://cdn.cloudpayments.ru https://cp.ru https://fingerprint.t-static.ru https://forma.tinkoff.ru https://pay.google.com; connect-src 'self' https://widget.cloudpayments.ru https://api.cloudpayments.ru https://intent-api.cloudpayments.ru https://fingerprint.t-static.ru https://forma.tinkoff.ru https://pay.google.com; img-src 'self' data: https://widget.cloudpayments.ru https://cdn.cloudpayments.ru https://cp.ru https://qr.nspk.ru https://intent-api.cloudpayments.ru https://www.gstatic.com; frame-src 'self' https://widget.cloudpayments.ru https://static.cloudpayments.ru https://cdn.cloudpayments.ru https://vkvideo.ru https://*.vkvideo.ru https://vk.com";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/bloknotservis.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bloknotservis.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.bloknotservis.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name bloknotservis.ru www.bloknotservis.ru;
    return 301 https://$host$request_uri;
}
