name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.10.187.195
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/bloknot-backend

            # Clean untracked files to avoid merge conflicts
            git clean -fd
            git reset --hard HEAD

            # Retry logic for git operations
            MAX_RETRIES=3
            RETRY_COUNT=0

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              echo "Git pull attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"
              if git pull origin main; then
                echo "Git pull successful"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Git pull failed, retrying in 10 seconds..."
                  sleep 10
                else
                  echo "Git pull failed after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done

            npm ci
            npx prisma db push
            npx prisma generate
            cp -r public/* /var/www/html/
            pm2 reload ecosystem.config.js --only bloknot --update-env
